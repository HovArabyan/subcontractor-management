const PortalJobDetail = ({ assignment, job, sub, onBack }) => {
  const today = "May 7, 2026";
  const PHOTO_COLORS = ["#E8D5B7","#B7D5E8","#D5E8B7","#E8B7D5","#D5D5E8","#E8E8B7"];

  const [photos, setPhotos] = useState([
    { id:1, label:"Roof deck inspection",      color:"#E8D5B7", timestamp:"7:42 AM" },
    { id:2, label:"TPO membrane roll-out",     color:"#B7D5E8", timestamp:"9:15 AM" },
  ]);
  const [checklist, setChecklist] = useState([
    { id:1, label:"Safety briefing completed with crew",             checked:true  },
    { id:2, label:"Site access confirmed with GC superintendent",    checked:true  },
    { id:3, label:"Materials staged and verified on site",           checked:true  },
    { id:4, label:"Work area barricaded / fall protection in place", checked:false },
    { id:5, label:"Today's tasks reviewed and assigned to crew",     checked:false },
    { id:6, label:"Site cleaned up at end of shift",                 checked:false },
  ]);
  const [note,      setNote]      = useState("");
  const [submitted, setSubmitted] = useState(false);

  const toggle   = id => setChecklist(p => p.map(c => c.id===id ? {...c, checked:!c.checked} : c));
  const addPhoto = label => setPhotos(p => [...p, {
    id: Date.now(), label: label || `Site photo ${p.length+1}`,
    color: PHOTO_COLORS[p.length % PHOTO_COLORS.length],
    timestamp: new Date().toLocaleTimeString("en-US", {hour:"numeric", minute:"2-digit"}),
  }]);

  const checked    = checklist.filter(c=>c.checked).length;
  const paidAmt    = assignment.pos.filter(p=>p.status==="paid").reduce((t,p)=>t+p.amt,0);

  if (submitted) return (
    <div style={{padding:"48px 28px", textAlign:"center"}}>
      <div style={{fontSize:52, marginBottom:16}}>✅</div>
      <div style={{fontSize:18, fontWeight:800, marginBottom:8}}>Daily Update Submitted</div>
      <div style={{fontSize:13, color:"var(--text-subdued)", lineHeight:1.65, maxWidth:340, margin:"0 auto 24px"}}>
        Your progress report for <strong>{today}</strong> has been sent to the project manager.
      </div>
      <button className="btn btn-md btn-primary" onClick={onBack}>← Back to My Jobs</button>
    </div>
  );

  return (
    <div>
      {/* Job header */}
      <div style={{background:"var(--bg-white)", borderBottom:"1px solid var(--border-grey)", padding:"14px 28px"}}>
        <button onClick={onBack} style={{background:"none", border:"none", cursor:"pointer", color:"var(--text-primary)", fontSize:13, fontWeight:700, display:"inline-flex", alignItems:"center", gap:5, marginBottom:10, padding:0}}>
          ← Back to My Jobs
        </button>
        <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:10}}>
          <div>
            <div style={{fontSize:17, fontWeight:800}}>{job?.name || assignment.jobId}</div>
            <div style={{fontSize:12, color:"var(--text-subdued)", marginTop:3, display:"flex", gap:10, flexWrap:"wrap"}}>
              <span>{job?.address}</span>
              {assignment.costCode && <><span>·</span><span>{assignment.costCode}</span></>}
            </div>
          </div>
          <span className="badge badge-success">Active</span>
        </div>
      </div>

      <div style={{padding:"20px 28px", display:"flex", flexDirection:"column", gap:16}}>

        {/* Scope of Work */}
        <div style={{background:"var(--bg-white)", border:"1px solid var(--border-grey)", borderRadius:"var(--r-md)", padding:"16px 20px"}}>
          <div style={{fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.5px", color:"var(--text-subdued)", marginBottom:8}}>Your Scope of Work</div>
          <div style={{fontSize:13, lineHeight:1.65}}>{assignment.scope}</div>
          <div style={{marginTop:14, display:"flex", gap:28, borderTop:"1px solid var(--border-grey)", paddingTop:12}}>
            {[
              {l:"Contracted Amount", v:fmtDollar(assignment.contractedAmt)},
              {l:"Paid to Date",      v:fmtDollar(paidAmt), color:"var(--success)"},
            ].map(s=>(
              <div key={s.l}>
                <div style={{fontSize:10, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.5px", color:"var(--text-subdued)", marginBottom:2}}>{s.l}</div>
                <div style={{fontWeight:700, fontSize:14, color:s.color||"var(--text-default)"}}>{s.v}</div>
              </div>
            ))}
          </div>
        </div>

        {/* Daily Progress Report */}
        <div style={{background:"var(--bg-white)", border:"2px solid var(--border-primary)", borderRadius:"var(--r-md)", padding:"16px 20px"}}>
          <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16}}>
            <div>
              <div style={{fontWeight:800, fontSize:15}}>Daily Progress Report</div>
              <div style={{fontSize:12, color:"var(--text-subdued)", marginTop:2}}>{today}</div>
            </div>
            <div style={{fontSize:12, color:checked===checklist.length?"var(--success)":"var(--text-subdued)", fontWeight:600}}>
              {checked}/{checklist.length} items complete
            </div>
          </div>

          {/* Daily checklist */}
          <div style={{marginBottom:18}}>
            <div style={{fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.5px", color:"var(--text-subdued)", marginBottom:8}}>Daily Checklist</div>
            <div style={{display:"flex", flexDirection:"column", gap:6}}>
              {checklist.map(c=>(
                <label key={c.id} style={{display:"flex", alignItems:"center", gap:10, cursor:"pointer", padding:"9px 12px", borderRadius:"var(--r-sm)", background:c.checked?"#F0FFF8":"var(--bg-grey-subdued)", border:`1px solid ${c.checked?"#A3E6C8":"var(--border-grey)"}`, transition:"background 0.12s"}}>
                  <input type="checkbox" checked={c.checked} onChange={()=>toggle(c.id)}
                    style={{width:16, height:16, accentColor:"var(--success)", cursor:"pointer", flexShrink:0}}/>
                  <span style={{fontSize:13, fontWeight:c.checked?600:400, color:c.checked?"var(--success)":"var(--text-default)"}}>{c.label}</span>
                </label>
              ))}
            </div>
          </div>

          {/* Notes */}
          <div style={{marginBottom:18}}>
            <div style={{fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.5px", color:"var(--text-subdued)", marginBottom:6}}>Notes for Today</div>
            <textarea className="form-textarea" rows={3}
              placeholder="Describe work completed today, issues encountered, materials used, crew notes…"
              value={note} onChange={e=>setNote(e.target.value)}/>
          </div>

          {/* Photos */}
          <div style={{marginBottom:18}}>
            <div style={{fontSize:11, fontWeight:700, textTransform:"uppercase", letterSpacing:"0.5px", color:"var(--text-subdued)", marginBottom:8}}>
              Site Photos <span style={{fontWeight:400, textTransform:"none", letterSpacing:"normal", fontSize:11}}>({photos.length} attached)</span>
            </div>
            <div style={{display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(108px, 1fr))", gap:8, marginBottom:10}}>
              {photos.map(p=>(
                <div key={p.id} style={{borderRadius:"var(--r-sm)", overflow:"hidden", border:"1px solid var(--border-grey)"}}>
                  <div style={{background:p.color, height:78, display:"flex", alignItems:"center", justifyContent:"center"}}>
                    <Ic n="photo" s={22} style={{opacity:0.25}}/>
                  </div>
                  <div style={{padding:"4px 7px", background:"white"}}>
                    <div style={{fontSize:10, fontWeight:600, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", color:"var(--text-default)"}}>{p.label}</div>
                    <div style={{fontSize:9, color:"var(--text-subdued)"}}>{p.timestamp}</div>
                  </div>
                </div>
              ))}
              <div onClick={()=>addPhoto()} style={{borderRadius:"var(--r-sm)", border:"2px dashed var(--border-grey)", height:108, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:4, cursor:"pointer", color:"var(--text-subdued)", transition:"all 0.12s"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor="var(--border-primary)";e.currentTarget.style.color="var(--text-primary)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="var(--border-grey)";e.currentTarget.style.color="var(--text-subdued)";}}>
                <Ic n="add" s={20}/>
                <span style={{fontSize:10, fontWeight:700}}>Add Photo</span>
              </div>
            </div>
            <div style={{display:"flex", gap:8}}>
              <button className="btn btn-sm btn-secondary" onClick={()=>addPhoto("Camera capture")}>
                <Ic n="camera" s={13}/> Take Photo
              </button>
              <button className="btn btn-sm btn-secondary" onClick={()=>addPhoto("Uploaded photo")}>
                <Ic n="upload" s={13}/> Upload Photo
              </button>
            </div>
          </div>

          {/* Submit */}
          <div style={{borderTop:"1px solid var(--border-grey)", paddingTop:16, display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, flexWrap:"wrap"}}>
            <div style={{fontSize:12, color:"var(--text-subdued)"}}>
              {checked === checklist.length
                ? <span style={{color:"var(--success)", fontWeight:600}}>✓ All checklist items complete</span>
                : <span>{checklist.length - checked} checklist item{checklist.length-checked!==1?"s":""} remaining</span>}
            </div>
            <button className="btn btn-md btn-primary" onClick={()=>setSubmitted(true)}>
              Submit Daily Update
            </button>
          </div>
        </div>

      </div>
    </div>
  );
};

/* ================================================================
   FEATURE 8 — SUB PORTAL PREVIEW
   ================================================================ */
const SubPortalView = ({subs, assignments, jobs, onAccept, onDecline}) => {
  const activeSubs = subs.filter(s=>s.status==="active");
  const [selSubId, setSelSubId] = useState(activeSubs[0]?.id||null);
  const [portalJob, setPortalJob] = useState(null);
  const sub = subs.find(s=>s.id===selSubId);
  const myAssign   = assignments.filter(a=>a.subId===selSubId&&a.status==="active");
  const myInvited  = assignments.filter(a=>a.subId===selSubId&&a.status==="invited");
  const totalPaid  = assignments.filter(a=>a.subId===selSubId)
    .reduce((t,a)=>t+a.pos.filter(p=>p.status==="paid").reduce((s,p)=>s+p.amt,0),0);

  return (
    <div style={{display:"flex",flexDirection:"column",flex:1,minHeight:0}}>
      <div className="topbar">
        <span className="topbar__title">Sub Portal Preview</span>
        <div className="topbar__actions">
          <select className="form-input" style={{width:260,fontSize:13}}
            value={selSubId||""}
            onChange={e=>{ setSelSubId(parseInt(e.target.value)); setPortalJob(null); }}>
            {activeSubs.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <button className="btn btn-md btn-secondary"><Ic n="portal" s={14}/> Send Portal Link</button>
        </div>
      </div>
      <div className="page-body" style={{background:"#F3F4F6"}}>
        <div className="portal-banner">
          <Ic n="warn" s={15}/>
          <span><strong>Portal Preview Mode</strong> — Read-only view of what {sub?.name||"this sub"} sees when they log into their portal. No actions are sent to the subcontractor.</span>
        </div>

        <div className="portal-frame">
          {/* Portal nav */}
          <div className="portal-nav">
            <svg viewBox="0 0 32 32" width="26" height="26">
              <circle cx="16" cy="16" r="15" fill="#0265DC"/>
              <text x="16" y="21" textAnchor="middle" fill="white" fontSize="12" fontWeight="800" fontFamily="'Nunito Sans',sans-serif">ST</text>
            </svg>
            <div style={{flex:1}}>
              <div style={{color:"white",fontWeight:800,fontSize:14}}>Subcontractor Portal</div>
              <div style={{color:"#9CA3AF",fontSize:11}}>Powered by ServiceTitan</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div className="avatar avatar-sm" style={{background:"rgba(255,255,255,0.15)",color:"white"}}>{sub?initials(sub.name):"?"}</div>
              <div>
                <div style={{color:"white",fontWeight:600,fontSize:13}}>{sub?.contact||"—"}</div>
                <div style={{color:"#9CA3AF",fontSize:11}}>{sub?.name}</div>
              </div>
            </div>
          </div>

          {/* Conditional: job detail OR dashboard */}
          {portalJob ? (
            <PortalJobDetail
              assignment={portalJob}
              job={jobs.find(j=>j.id===portalJob.jobId)}
              sub={sub}
              onBack={()=>setPortalJob(null)}
            />
          ) : (<>

          {/* Welcome strip */}
          <div style={{background:"var(--bg-primary-subdued)",borderBottom:"1px solid var(--border-grey)",padding:"14px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:16,fontWeight:800}}>Welcome back, {sub?.contact?.split(" ")[0]||"there"}</div>
              <div style={{fontSize:12,color:"var(--text-subdued)",marginTop:2}}>{myAssign.length} active job{myAssign.length!==1?"s":""} · {fmtDollar(totalPaid)} paid to date</div>
            </div>
            <span className="badge badge-success" style={{fontSize:12}}>Active Vendor</span>
          </div>

          {/* Pending invitations */}
          {myInvited.length > 0 && (
            <div style={{padding:"20px 28px 0"}}>
              <div className="portal-section-label" style={{color:"var(--warning-text)"}}>
                Pending Invitations — Action Required
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {myInvited.map(a => {
                  const job = jobs.find(j=>j.id===a.jobId);
                  return (
                    <div key={a.id} style={{border:"2px solid var(--warning)",borderRadius:"var(--r-md)",padding:"16px 20px",background:"#FFFDF0"}}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{job?.name||a.jobId}</div>
                          <div style={{fontSize:12,color:"var(--text-subdued)",marginTop:2}}>{job?.address}</div>
                        </div>
                        <span className="badge badge-warning">Awaiting Response</span>
                      </div>
                      <div style={{fontSize:13,lineHeight:1.6,marginBottom:14,padding:"8px 12px",background:"white",borderRadius:"var(--r-sm)",border:"1px solid var(--border-grey)"}}>
                        <span style={{fontSize:11,fontWeight:700,color:"var(--text-subdued)",textTransform:"uppercase",display:"block",marginBottom:3}}>Scope of Work</span>
                        {a.scope}
                      </div>
                      {a.contractedAmt > 0 && (
                        <div style={{marginBottom:14}}>
                          <span style={{fontSize:11,fontWeight:700,color:"var(--text-subdued)",textTransform:"uppercase",letterSpacing:"0.5px"}}>Contracted Amount </span>
                          <span style={{fontWeight:800,fontSize:15}}>{fmtDollar(a.contractedAmt)}</span>
                          {a.costCode && <span style={{fontSize:12,color:"var(--text-subdued)",marginLeft:10}}>{a.costCode}</span>}
                        </div>
                      )}
                      <div style={{display:"flex",gap:10}}>
                        <button className="btn btn-md btn-primary" style={{background:"var(--success)",borderColor:"var(--success)"}}
                          onClick={()=>onAccept(a.id)}>
                          <Ic n="check" s={15}/> Accept Assignment
                        </button>
                        <button className="btn btn-md btn-secondary" style={{color:"var(--danger)",borderColor:"var(--danger)"}}
                          onClick={()=>onDecline(a.id)}>
                          Decline
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* Active jobs */}
          <div style={{padding:"20px 28px"}}>
            <div className="portal-section-label">Active Jobs</div>
            {myAssign.length===0 ? (
              <div style={{textAlign:"center",padding:"32px",color:"var(--text-subdued)",fontSize:13}}>No active job assignments at this time.</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {myAssign.map(a=>{
                  const job=jobs.find(j=>j.id===a.jobId);
                  const paid=a.pos.filter(p=>p.status==="paid").reduce((t,p)=>t+p.amt,0);
                  const pending=a.pos.filter(p=>p.status!=="paid").reduce((t,p)=>t+p.amt,0);
                  return (
                    <div key={a.id} className="portal-job-card" style={{cursor:"pointer",transition:"box-shadow 0.12s"}}
                      onClick={()=>setPortalJob(a)}
                      onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 12px rgba(2,101,220,0.12)"}
                      onMouseLeave={e=>e.currentTarget.style.boxShadow=""}>
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{job?.name||a.jobId}</div>
                          <div style={{fontSize:12,color:"var(--text-subdued)",marginTop:2}}>{job?.address}</div>
                        </div>
                        <StatusBadge s={a.status}/>
                      </div>
                      <div style={{fontSize:13,lineHeight:1.6,marginBottom:12,padding:"8px 12px",background:"white",borderRadius:"var(--r-sm)",border:"1px solid var(--border-grey)"}}>
                        <span style={{fontSize:11,fontWeight:700,color:"var(--text-subdued)",textTransform:"uppercase",display:"block",marginBottom:3}}>Your Scope</span>
                        {a.scope}
                      </div>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <div style={{display:"flex",gap:24}}>
                          {[
                            {l:"Contracted",   v:fmtDollar(a.contractedAmt),         color:undefined},
                            {l:"Paid to Date", v:fmtDollar(paid),                    color:"var(--success)"},
                            {l:"Pending",      v:pending>0?fmtDollar(pending):"—",   color:pending>0?"var(--warning-text)":undefined},
                          ].map(s=>(
                            <div key={s.l}>
                              <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"var(--text-subdued)"}}>{s.l}</div>
                              <div style={{fontWeight:700,fontSize:14,color:s.color||"var(--text-default)"}}>{s.v}</div>
                            </div>
                          ))}
                        </div>
                        <span style={{fontSize:12,fontWeight:700,color:"var(--text-primary)",display:"flex",alignItems:"center",gap:4}}>
                          View Job &amp; Submit Update <Ic n="chev" s={13}/>
                        </span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Documents on file */}
          <div style={{padding:"0 28px 20px",borderTop:"1px solid var(--border-grey)",marginTop:4}}>
            <div style={{padding:"16px 0 12px"}} className="portal-section-label">Documents On File</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[
                {label:"Certificate of Insurance", badge:<CoiBadge s={sub?.coi||"n/a"}/>},
                {label:"W-9 / Tax Form",           badge:<span className={`badge ${sub?.w9?"badge-success":"badge-danger"}`}>{sub?.w9?"On File":"Missing"}</span>},
                {label:"Contractor License",       badge:<span className={`badge ${sub?.lic?"badge-success":"badge-neutral"}`}>{sub?.lic||"Not Provided"}</span>},
              ].map(d=>(
                <div key={d.label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",border:"1px solid var(--border-grey)",borderRadius:"var(--r-sm)",background:"white"}}>
                  <div style={{fontWeight:600,fontSize:13}}>{d.label}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {d.badge}
                    <button className="btn btn-xs btn-secondary"><Ic n="upload" s={11}/> Upload</button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Footer */}
          <div style={{background:"var(--bg-grey-subdued)",borderTop:"1px solid var(--border-grey)",padding:"12px 28px",fontSize:12,color:"var(--text-subdued)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>Questions? Contact your project manager at {sub?.email||"—"}</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}>
              <svg viewBox="0 0 32 32" width="14" height="14"><circle cx="16" cy="16" r="15" fill="#0265DC"/><text x="16" y="21" textAnchor="middle" fill="white" fontSize="12" fontWeight="800" fontFamily="'Nunito Sans',sans-serif">ST</text></svg>
              Powered by ServiceTitan
            </span>
          </div>

          </>)}
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   JOBS LIST VIEW
   ================================================================ */
const JobsListView = ({ jobs, assignments, subs, onSelect }) => {
  const jobOnlyList = jobs.filter(j => j.type === "job");
  const getSubCount = (jobId) => assignments.filter(a => a.jobId === jobId && a.status !== "removed").length;
  const statusColor = s => s==="active"?"var(--success)":s==="scheduled"?"var(--text-primary)":s==="completed"?"var(--text-muted)":"var(--warning-text)";

  return (
    <div>
      <div className="topbar">
        <span className="topbar__title">Jobs</span>
        <div className="topbar__actions">
          <button className="btn btn-md btn-primary"><Ic n="add" s={16}/> New Job</button>
        </div>
      </div>
      <div className="page-body">
        <div className="stats-row-4" style={{marginBottom:20}}>
          {[
            {l:"Total Jobs",    v:jobOnlyList.length},
            {l:"Active",        v:jobOnlyList.filter(j=>j.status==="active").length},
            {l:"Scheduled",     v:jobOnlyList.filter(j=>j.status==="scheduled").length},
            {l:"Completed",     v:jobOnlyList.filter(j=>j.status==="completed").length},
          ].map(s=>(
            <div key={s.l} className="stat-card">
              <div className="stat-card__label">{s.l}</div>
              <div className="stat-card__value">{s.v}</div>
            </div>
          ))}
        </div>
        <div className="card" style={{padding:0}}>
          <table style={{tableLayout:"fixed",width:"100%"}}>
            <thead>
              <tr>
                <th style={{width:"8%"}}>Job #</th>
                <th style={{width:"28%"}}>Job Name</th>
                <th style={{width:"18%"}}>Customer</th>
                <th style={{width:"16%"}}>Job Type</th>
                <th style={{width:"10%"}}>Status</th>
                <th style={{width:"10%"}}>Value</th>
                <th style={{width:"10%"}}>Sub Count</th>
              </tr>
            </thead>
            <tbody>
              {jobOnlyList.map(j => {
                const subCount = getSubCount(j.id);
                return (
                  <tr key={j.id} style={{cursor:"pointer"}} onClick={()=>onSelect(j)}>
                    <td style={{fontWeight:700,color:"var(--text-primary)",fontSize:13}}>{j.id}</td>
                    <td>
                      <div style={{fontWeight:600,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{j.name}</div>
                      <div style={{fontSize:11,color:"var(--text-subdued)",marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{j.address}</div>
                    </td>
                    <td style={{fontSize:13}}>{j.customer}</td>
                    <td style={{fontSize:13,color:"var(--text-subdued)"}}>{j.jobType||"—"}</td>
                    <td>
                      <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,fontWeight:700,color:statusColor(j.status)}}>
                        <span style={{width:7,height:7,borderRadius:"50%",background:statusColor(j.status),display:"inline-block"}}/>
                        {j.status ? j.status.charAt(0).toUpperCase()+j.status.slice(1) : "—"}
                      </span>
                    </td>
                    <td style={{fontWeight:700,fontSize:13}}>{j.value>0?fmtDollar(j.value):"—"}</td>
                    <td>
                      <span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:13}}>

                    </td>

            </tbody>
          </table>

            <div style={{padding:48,textAlign:"center",color:"var(--text-subdued)"}}>No jobs found</div>
          )}
        </div>
      </div>
    </div>
  );
};

              <span style={{fontSize:11,background:"#DBEAFE",color:"#1D4ED8",padding:"2px 8px",borderRadius:"var(--r-full)",fontWeight:700}}>Pre-selected from Agreement</span>
            </div>
            <div className="form-field">
              <label className="form-label">Assign Subcontractor</label>
              <select className="form-input" value={selectedSubId} onChange={e=>setSelectedSubId(parseInt(e.target.value))}>
                <option value="">— None —</option>
                {subs.filter(s=>s.status==="active").map(s=>(
                  <option key={s.id} value={s.id}>{s.name} · {s.trades[0]}</option>
                ))}
              </select>
            </div>
            {selectedSubId && subs.find(s=>s.id===selectedSubId) && (
              <div style={{display:"flex",alignItems:"center",gap:10,marginTop:10,padding:"10px 12px",background:"white",borderRadius:"var(--r-sm)",border:"1px solid var(--border-grey)"}}>
                <div className="avatar">{initials(subs.find(s=>s.id===selectedSubId).name)}</div>
                <div>
                  <div style={{fontWeight:700,fontSize:13}}>{subs.find(s=>s.id===selectedSubId).name}</div>
                  <div style={{fontSize:12,color:"var(--text-subdued)"}}>{subs.find(s=>s.id===selectedSubId).trades.join(", ")} · {subs.find(s=>s.id===selectedSubId).region}</div>
                </div>
                <div style={{marginLeft:"auto",display:"flex",gap:8}}>
                  <CoiBadge s={subs.find(s=>s.id===selectedSubId).coi}/>
                  {subs.find(s=>s.id===selectedSubId).w9 && <span className="badge badge-success">W-9</span>}
                </div>
              </div>
            )}
            <div style={{fontSize:11,color:"var(--text-subdued)",marginTop:8}}>The selected subcontractor will receive an assignment notification and appear in the job's subcontractor roster.</div>
          </div>

          <div className="form-section">
            <div className="form-section__title">Additional Details</div>
            <div className="form-grid-2">
              <div className="form-field">
                <label className="form-label">Customer PO # (optional)</label>
                <input className="form-input" placeholder="e.g. PO-2026-0088"/>
              </div>
              <div className="form-field">
                <label className="form-label">Technician (optional)</label>
                <select className="form-input"><option value="">— Unassigned —</option><option>Schedule Assistant</option></select>
              </div>
            </div>
            <div className="form-field" style={{marginTop:12}}>
              <label className="form-label">Summary (optional)</label>
              <textarea className="form-textarea" rows={2} placeholder="Add a job summary…" value={summary} onChange={e=>setSummary(e.target.value)}/>
            </div>
          </div>

        </div>
        <div className="drawer__footer">
          <button className="btn btn-md btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-md btn-primary" onClick={()=>setBooked(true)}>
            <Ic n="book" s={15}/> Book Job
          </button>
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   ROOT APP
   ================================================================ */
const RAIL_ITEMS_PRIMARY = [
  {id:"subs",        label:"Subs"},
  {id:"projects",    label:"Projects"},
  {id:"jobs",        label:"Jobs"},
  {id:"agreements",  label:"Agreements"},
];
const RAIL_ITEMS_OTHER = [
  {id:"dashboard",   label:"Dashboard"},
  {id:"calls",       label:"Calls"},
  {id:"sched",       label:"Schedule"},
  {id:"dispatch",    label:"Dispatch"},
  {id:"accounting",  label:"Accounting"},
  {id:"inventory",   label:"Inventory"},
  {id:"followup",    label:"Follow Up"},
  {id:"reports",     label:"Reports"},
  {id:"marketing",   label:"Marketing"},
  {id:"pricebook",   label:"Pricebook"},
];
const RAIL_ITEMS = [...RAIL_ITEMS_PRIMARY, ...RAIL_ITEMS_OTHER];

function App() {
  const [subs, setSubs]               = useState(SUBS_INIT);
  const [jobs, setJobs]               = useState(JOBS_INIT);
  const [assignments, setAssignments] = useState(ASSIGNMENTS_INIT);
  const [activeRail, setRail]         = useState("subs");
  const [activeSection, setSection]   = useState("directory");
  const [selectedSub, setSelected]    = useState(null);
  const [showAdd, setShowAdd]         = useState(false);
  const [showAssign, setShowAssign]   = useState(false);
  const [assignTarget, setAssignTarget] = useState(null);
  const [jobTarget, setJobTarget]     = useState(null);
  const [spendExpanded, setSpendExpanded] = useState(null);
  // Projects module state
  const [selectedProject, setSelectedProject] = useState(null);
  const [projectTab,      setProjectTab]       = useState("dashboard");
  // PO flow state
  const [showCreatePo,   setShowCreatePo]   = useState(false);
  const [createPoTarget, setCreatePoTarget] = useState(null);
  // P1 state
  const [subcontracts, setSubcontracts] = useState(SUBCONTRACTS_INIT);
  const [lienWaivers,  setLienWaivers]  = useState(LIEN_WAIVERS_INIT);
  const [complianceDocs]                = useState(COMPLIANCE_DOCS_INIT);
  const [schedule]                      = useState(SCHEDULE_INIT);
  const [selectedContract, setSelectedContract] = useState(null);
  // Notify flow state
  const [showNotify,   setShowNotify]   = useState(false);
  const [notifyTarget, setNotifyTarget] = useState(null);
  // Agreements module state
  const [agreements, setAgreements]           = useState(AGREEMENTS_INIT);
  const [selectedAgreement, setSelectedAgreement] = useState(null);
  const [bookingVisit, setBookingVisit]       = useState(null);
  const [showBookJob, setShowBookJob]         = useState(false);
  const [selectedJob, setSelectedJob]         = useState(null);
  const [jobTab, setJobTab]                   = useState("overview");
  const [projectsView, setProjectsView]       = useState("projects"); // "projects" | "jobs"

  const openAssign = useCallback((sub = null, job = null) => {
    setAssignTarget(sub);
    setJobTarget(job);
    setShowAssign(true);
  }, []);

  const handleSaveSub = useCallback(sub => {
    setSubs(p => [sub, ...p]);
    setShowAdd(false);
  }, []);

  const handleSaveAssignment = useCallback(newA => {
    setAssignments(p => [newA, ...p]);
    // bump activeJobs on the sub
    setSubs(p => p.map(s => s.id === newA.subId ? { ...s, activeJobs: s.activeJobs + 1 } : s));
    setShowAssign(false);
    setAssignTarget(null);
    // navigate to assignments view so user can see the result
    setSection("assignments");
    setSelected(null);
  }, []);

  const handleSavePo = useCallback((assignmentId, poData) => {
    setAssignments(prev => prev.map(a =>
      a.id === assignmentId ? { ...a, pos: [...a.pos, poData] } : a
    ));
    setShowCreatePo(false);
    setCreatePoTarget(null);
  }, []);

  const handleUpdatePoStatus = useCallback((assignmentId, poId, newStatus) => {
    setAssignments(prev => prev.map(a =>
      a.id !== assignmentId ? a : {
        ...a, pos: a.pos.map(p => p.id === poId ? { ...p, status: newStatus } : p)
      }
    ));
  }, []);

  const goToSub = useCallback(sub => {
    setSection("directory");
    setSelected(sub);
  }, []);

  const handleNotifySend = useCallback(assignmentId => {
    setAssignments(prev => prev.map(a =>
      a.id === assignmentId ? { ...a, status: "invited", notifiedAt: "May 4, 2026" } : a
    ));
    setShowNotify(false);
    setNotifyTarget(null);
  }, []);

  const handleAcceptAssignment = useCallback(assignmentId => {
    setAssignments(prev => prev.map(a =>
      a.id === assignmentId ? { ...a, status: "active", notifiedAt: a.notifiedAt } : a
    ));
  }, []);

  const handleDeclineAssignment = useCallback(assignmentId => {
    setAssignments(prev => prev.map(a =>
      a.id === assignmentId ? { ...a, status: "removed" } : a
    ));
  }, []);

  const renderMain = () => {
    /* ── Not-in-scope rails ── */
    if (activeRail !== "subs" && activeRail !== "projects" && activeRail !== "jobs" && activeRail !== "agreements") {
      const label = RAIL_ITEMS.find(r => r.id === activeRail)?.label || activeRail;
      return (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:40}}>
          <div style={{width:64,height:64,borderRadius:"var(--r-lg)",background:"var(--bg-grey)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-subdued)"}}>
            <Ic n={activeRail} s={30}/>
          </div>
          <div style={{fontSize:20,fontWeight:800,color:"var(--text-default)",letterSpacing:"-0.3px"}}>{label}</div>
          <div style={{fontSize:14,color:"var(--text-subdued)",maxWidth:340,textAlign:"center",lineHeight:1.6}}>
            This section is not part of the subcontractor management prototype.<br/>
            Navigate to <strong>Projects</strong> or <strong>Subs</strong> to explore the prototype flows.
          </div>
        </div>
      );
    }

    /* ── Agreements module ── */
    if (activeRail === "agreements") {
      if (selectedAgreement) {
        return <AgreementDetailView
          agreement={selectedAgreement}
          subs={subs}
          onBack={()=>setSelectedAgreement(null)}
          onBookVisit={v=>{ setBookingVisit(v); setShowBookJob(true); }}
        />;
      }
      return <AgreementsListView agreements={agreements} subs={subs} onSelect={a=>setSelectedAgreement(a)} />;
    }

    /* ── Jobs module ── */
    if (activeRail === "jobs") {
      if (selectedJob) {
        const openIssuePo = a => { setCreatePoTarget(a); setShowCreatePo(true); };
        return <JobDetailView
          job={selectedJob}
          assignments={assignments}
          subs={subs}
          onBack={()=>setSelectedJob(null)}
          onAssign={()=>openAssign(null, selectedJob)}
          onIssuePo={openIssuePo}
          onNotify={a=>{ setNotifyTarget(a); setShowNotify(true); }}
        />;
      }
      return <JobsListView jobs={jobs} assignments={assignments} subs={subs}
        onSelect={j=>{ setSelectedJob(j); setJobTab("subcontractors"); }} />;
    }

    /* ── Projects module ── */
    if (activeRail === "projects") {
      if (!selectedProject) {
        return <ProjectsList onSelect={p=>{ setSelectedProject(p); setProjectTab("dashboard"); }} />;
      }
      const tabContent = () => {
        const openIssuePo = a => { setCreatePoTarget(a); setShowCreatePo(true); };
        if (projectTab === "dashboard")  return <ProjectDashboard project={selectedProject} />;
        if (projectTab === "financials") return <ProjectFinancials project={selectedProject} assignments={assignments} />;
        if (projectTab === "subs")       return <ProjectSubsTab project={selectedProject} subs={subs} assignments={assignments} onAssign={()=>openAssign(null, selectedProject)} onIssuePo={openIssuePo} onNotify={a=>{ setNotifyTarget(a); setShowNotify(true); }} />;
        if (projectTab === "purchasing") return <ProjectPurchasingTab project={selectedProject} subs={subs} assignments={assignments} onIssuePo={openIssuePo} onUpdatePoStatus={handleUpdatePoStatus} />;
        return <ProjectStub name={PROJECT_NAV.find(n=>n.id===projectTab)?.label||projectTab} />;
      };
      return (
        <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
          <ProjectHeader project={selectedProject} />
          <div style={{flex:1,overflowY:"auto"}}>
            {tabContent()}
          </div>
        </div>
      );
    }

    /* ── Subs module ── */
    if (activeSection === "directory") {
      if (selectedSub) {
        // keep selectedSub in sync with subs state (activeJobs may have changed)
        const liveSub = subs.find(s => s.id === selectedSub.id) ?? selectedSub;
        return (
          <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
            <div className="topbar">
              <div className="topbar__breadcrumb">
                <span className="crumb-link" onClick={()=>setSelected(null)}>Directory</span>
                <span className="crumb-sep"><Ic n="chev" s={13}/></span>
                <span className="crumb-current">{liveSub.name}</span>
              </div>
              <div className="topbar__actions">
                <button className="btn btn-md btn-primary" onClick={()=>setShowAdd(true)}>
                  <Ic n="add" s={16}/> Add Subcontractor
                </button>
              </div>
            </div>
            <div className="page-body">
              <SubDetail
                sub={liveSub}
                onBack={()=>setSelected(null)}
                onAssign={()=>openAssign(liveSub)}
                assignments={assignments}
                jobs={jobs}
              />
            </div>
          </div>
        );
      }
      return <DirectoryView subs={subs} onAdd={()=>setShowAdd(true)} onSelect={setSelected} />;
    }
    if (activeSection === "assignments") {
      return <AssignmentsView assignments={assignments} subs={subs} jobs={jobs} onNew={()=>openAssign(null)}
        onNotify={a=>{ setNotifyTarget(a); setShowNotify(true); }} />;
    }
    if (activeSection === "spend") return <SpendView subs={subs} assignments={assignments} jobs={jobs} onViewSub={goToSub} expandedId={spendExpanded} setExpandedId={setSpendExpanded} />;

    // ── P1 sections ──
    if (activeSection === "subcontracts") {
      if (selectedContract) {
        return <SubcontractDetail
          contract={selectedContract}
          subs={subs} jobs={jobs} lienWaivers={lienWaivers}
          onBack={()=>setSelectedContract(null)}
        />;
      }
      return <SubcontractsView
        subcontracts={subcontracts} subs={subs} jobs={jobs}
        onSelect={c=>setSelectedContract(c)}
        onNew={()=>{}}
      />;
    }
    if (activeSection === "lien-waivers") {
      return <LienWaiversView
        lienWaivers={lienWaivers} subs={subs} jobs={jobs}
        onMarkReceived={id=>setLienWaivers(prev=>prev.map(w=>w.id===id?{...w,status:"received"}:w))}
      />;
    }
    if (activeSection === "compliance-docs") {
      return <ComplianceDocsView subs={subs} complianceDocs={complianceDocs} />;
    }
if (activeSection === "portal") {
      return <SubPortalView subs={subs} assignments={assignments} jobs={jobs}
        onAccept={handleAcceptAssignment} onDecline={handleDeclineAssignment} />;
    }
    return null;
  };

  return (
    <div className="shell">
      {/* Icon rail */}
      <nav className="icon-rail">
        <div className="icon-rail__logo">
          <svg viewBox="0 0 32 32" width="30" height="30">
            <circle cx="16" cy="16" r="15" fill="#0265DC"/>
            <text x="16" y="21" textAnchor="middle" fill="white" fontSize="12" fontWeight="800"
              fontFamily="'Nunito Sans', sans-serif">ST</text>
          </svg>
        </div>
        {RAIL_ITEMS_PRIMARY.map(item => (
          <div key={item.id} className={`icon-rail__item ${activeRail===item.id?"active":""}`}
            onClick={()=>setRail(item.id)}>
            <Ic n={item.id} s={17}/>
            <span>{item.label}</span>
          </div>
        ))}
        <div style={{width:28,height:1,background:"rgba(255,255,255,0.12)",margin:"6px 0"}}/>
        {RAIL_ITEMS_OTHER.map(item => (
          <div key={item.id} className={`icon-rail__item ${activeRail===item.id?"active":""}`}
            onClick={()=>setRail(item.id)}>
            <Ic n={item.id} s={17}/>
            <span>{item.label}</span>
          </div>
        ))}
      </nav>

      {/* Side nav */}
      <nav className="side-nav" style={{display:"flex",flexDirection:"column"}}>

        {/* ── Subs module nav ── */}
        {activeRail === "subs" && <>
          <div className="side-nav__header">Subcontractors</div>

          <div className="side-nav__group">
            <div className="side-nav__label">Manage</div>
            {[
              {id:"directory",    label:"Directory"},
              {id:"assignments",  label:"Assignments"},
              {id:"subcontracts", label:"Subcontracts"},
            ].map(item => (
              <div key={item.id}
                className={`side-nav__item ${activeSection===item.id?"active":""}`}
                onClick={()=>{ setSection(item.id); setSelected(null); setSelectedContract(null); }}>
                {item.label}
                {item.id==="directory" && subs.filter(s=>s.coi==="expired").length > 0 &&
                  <span className="side-nav__badge">{subs.filter(s=>s.coi==="expired").length}</span>}
                {item.id==="assignments" && assignments.filter(a=>a.pos.some(p=>p.status==="pending")).length > 0 &&
                  <span className="side-nav__badge" style={{background:"var(--warning-bg)",color:"var(--warning-text)"}}>
                    {assignments.filter(a=>a.pos.some(p=>p.status==="pending")).length}
                  </span>}
              </div>
            ))}
          </div>

          <div className="side-nav__group">
            <div className="side-nav__label">Compliance</div>
            {[
              {id:"compliance-docs", label:"Compliance Docs",
               badge: complianceDocs.filter(d=>d.status==="expired"||d.status==="missing").length},
              {id:"lien-waivers",    label:"Lien Waivers",
               badge: lienWaivers.filter(w=>w.status==="overdue").length},
            ].map(item => (
              <div key={item.id}
                className={`side-nav__item ${activeSection===item.id?"active":""}`}
                onClick={()=>{ setSection(item.id); setSelected(null); }}>
                {item.label}
                {item.badge > 0 &&
                  <span className="side-nav__badge">{item.badge}</span>}
              </div>
            ))}
          </div>

          <div className="side-nav__group">
            <div className="side-nav__label">Reporting</div>
            <div className={`side-nav__item ${activeSection==="spend"?"active":""}`}
              onClick={()=>{ setSection("spend"); setSelected(null); }}>
              Spend Reports
            </div>
          </div>

          <div className="side-nav__group">
            <div className="side-nav__label">Portal</div>
            <div className={`side-nav__item ${activeSection==="portal"?"active":""}`}
              onClick={()=>{ setSection("portal"); setSelected(null); }}>
              Sub Portal Preview
            </div>
          </div>
        </>}

        {/* ── Agreements module nav ── */}
        {activeRail === "agreements" && <>
          <div className="side-nav__header">Agreements</div>
          <div className="side-nav__group">
            <div className={`side-nav__item ${!selectedAgreement?"active":""}`}
              onClick={()=>setSelectedAgreement(null)}>
              Service Agreements
            </div>
          </div>
          {selectedAgreement && (
            <div className="side-nav__group">
              <div className="side-nav__label">Current</div>
              <div className="side-nav__item active" style={{fontSize:12,lineHeight:1.4,whiteSpace:"normal",padding:"8px 16px"}}>
                {selectedAgreement.name}
              </div>
            </div>
          )}
        </>}

        {/* ── Projects module nav (list) ── */}
        {activeRail === "projects" && !selectedProject && <>
          <div className="side-nav__header">Projects</div>
          <div className="side-nav__group">
            <div className="side-nav__item active">All Projects</div>
          </div>
        </>}

        {/* ── Jobs module nav ── */}
        {activeRail === "jobs" && !selectedJob && <>
          <div className="side-nav__header">Jobs</div>
          <div className="side-nav__group">
            <div className="side-nav__item active">All Jobs</div>
          </div>
        </>}

        {/* ── Job detail nav ── */}
        {activeRail === "jobs" && selectedJob && <>
          <div className="side-nav__back"
            onClick={()=>setSelectedJob(null)}>
            <Ic n="back" s={14}/> Jobs
          </div>
          <div style={{padding:"8px 16px 4px",fontSize:11,fontWeight:700,color:"var(--text-muted)",textTransform:"uppercase",letterSpacing:"0.5px"}}>
            {selectedJob.id}
          </div>
          {[
            {id:"overview",        label:"Overview"},
            {id:"subcontractors",  label:"Subcontractors"},
            {id:"purchasing",      label:"Purchasing"},
            {id:"notes",           label:"Notes"},
          ].map(item=>(
            <div key={item.id}
              className={`side-nav__item ${jobTab===item.id?"active":""}`}
              onClick={()=>setJobTab(item.id)}>
              {item.label}
            </div>
          ))}
        </>}

        {/* ── Projects module nav (project detail) ── */}
        {activeRail === "projects" && selectedProject && <>
          <div className="side-nav__back"
            onClick={()=>{ setSelectedProject(null); setProjectTab("dashboard"); }}>
            <Ic n="back" s={14}/> Projects
          </div>
          <div style={{overflowY:"auto", flex:1, paddingTop:4}}>
            {PROJECT_NAV.map(item => (
              <div key={item.id}
                className={`side-nav__item proj-nav-item ${projectTab===item.id?"active":""} ${item.hl?"hl":""}`}
                onClick={()=>setProjectTab(item.id)}>
                <div className="pnl">{item.label}</div>
                <div className="pns">{item.sub}</div>
              </div>
            ))}
          </div>
        </>}

      </nav>

      {/* Main content */}
      <div className="main">
        {renderMain()}
      </div>

      {showAdd && <AddDrawer onClose={()=>setShowAdd(false)} onSave={handleSaveSub} />}
      {showAssign && (
        <AssignDrawer
          subs={subs}
          jobs={jobs}
          assignments={assignments}
          preSelectedSub={assignTarget}
          preSelectedJob={jobTarget}
          onClose={()=>{ setShowAssign(false); setAssignTarget(null); setJobTarget(null); }}
          onSave={handleSaveAssignment}
        />
      )}
      {showCreatePo && createPoTarget && (
        <CreatePoDrawer
          assignment={createPoTarget}
          subs={subs}
          onClose={()=>{ setShowCreatePo(false); setCreatePoTarget(null); }}
          onSave={handleSavePo}
        />
      )}
      {showNotify && notifyTarget && (
        <NotifySubDrawer
          assignment={notifyTarget}
          subs={subs}
          jobs={jobs}
          onClose={()=>{ setShowNotify(false); setNotifyTarget(null); }}
          onSend={handleNotifySend}
        />
      )}
      {showBookJob && bookingVisit && selectedAgreement && (
        <BookJobDrawer
          agreement={selectedAgreement}
          visit={bookingVisit}
          subs={subs}
          onClose={()=>{ setShowBookJob(false); setBookingVisit(null); }}
          onBook={(visitId, jobNum, bookData)=>{
            // Update agreement visit with job number
            setAgreements(prev => prev.map(ag =>
              ag.id !== selectedAgreement.id ? ag : {
                ...ag,
                visits: ag.visits.map(v => v.id===visitId ? {...v, jobId:jobNum} : v)
              }
            ));
            setSelectedAgreement(prev => prev ? {
              ...prev,
              visits: prev.visits.map(v => v.id===visitId ? {...v, jobId:jobNum} : v)
            } : prev);
            // Create the new job
            if (bookData) {
              const newJob = {
                id: jobNum,
                name: `${bookData.visit.jobType} – ${bookData.visit.location}`,
                customer: bookData.agreement.customer,
                type: "job",
                value: 0,
                address: bookData.agreement.primaryLocation || bookData.agreement.customer,
                jobType: bookData.visit.jobType,
                businessUnit: bookData.agreement.businessUnit,
                status: "scheduled",
                agreementId: bookData.agreement.id,
                agreementName: bookData.agreement.name,
              };
              setJobs(prev => [newJob, ...prev]);
              // Create assignment if a sub was selected
              if (bookData.selectedSubId) {
                const newAssign = {
                  id: Date.now(),
                  subId: bookData.selectedSubId,
                  jobId: jobNum,
                  scope: `${bookData.visit.jobType} – from ${bookData.agreement.name}`,
                  status: "active",
                  costCode: "",
                  contractedAmt: 0,
                  pos: [],
                };
                setAssignments(prev => [newAssign, ...prev]);
              }
              // Navigate to the new job page
              setRail("jobs");
              setSelectedJob(newJob);
              setJobTab("subcontractors");
              setSelectedProject(null);
            }
          }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
