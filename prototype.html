<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiceTitan – Subcontractor Management</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,600;0,6..12,700;0,6..12,800;1,6..12,400&display=swap" rel="stylesheet" />
  <style>
    /* =====================================================
       ServiceTitan Anvil2 Design Tokens (from Figma)
       ===================================================== */
    :root {
      --font-body: 'Nunito Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-heading: 'Nunito Sans', -apple-system, sans-serif; /* Sofia Pro fallback */

      /* Text */
      --text-default:   #141414;
      --text-subdued:   #606162;
      --text-muted:     #737475;
      --text-on-grey:   #444445;
      --text-primary:   #0265DC;
      --text-inverted:  #FFFFFF;
      --text-link:      #2270EE;

      /* Backgrounds */
      --bg-app:              #FCFCFC;
      --bg-white:            #FFFFFF;
      --bg-grey-subdued:     #F7F7F7;
      --bg-grey:             #EEEEEE;
      --bg-primary:          #0265DC;
      --bg-primary-subdued:  #E0F2FF;
      --bg-nav:              #1A1D23;

      /* Borders */
      --border-grey:        #DFE0E1;
      --border-grey-strong: #BCBCBD;
      --border-primary:     #0265DC;
      --border-strong:      #444445;

      /* Status */
      --success:     #007A4D;
      --success-bg:  #CEF8E0;
      --danger:      #E13212;
      --danger-bg:   #FFEAE5;
      --warning:     #FFBE00;
      --warning-bg:  #FFF8E0;
      --warning-text:#7A5500;

      /* Spacing scale */
      --sp-1: 4px;  --sp-2: 8px;   --sp-3: 12px;  --sp-4: 16px;
      --sp-5: 20px; --sp-6: 24px;  --sp-8: 32px;  --sp-12: 48px;

      /* Radius */
      --r-sm: 4px;
      --r-md: 6px;
      --r-lg: 12px;
      --r-xl: 16px;
      --r-full: 9999px;

      /* Shadows */
      --shadow-float:   0 2px 8px rgba(20,20,20,0.08);
      --shadow-overlay: 0 8px 24px rgba(20,20,20,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-default);
      background: var(--bg-app);
      -webkit-font-smoothing: antialiased;
    }

    /* =====================================================
       APP SHELL
       ===================================================== */
    .shell { display: flex; height: 100vh; overflow: hidden; }

    /* Icon rail */
    .icon-rail {
      width: 52px;
      background: var(--bg-nav);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      gap: 2px;
      flex-shrink: 0;
      z-index: 20;
    }
    .icon-rail__logo {
      width: 32px; height: 32px;
      margin-bottom: 12px;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-rail__item {
      width: 40px; height: 40px;
      border-radius: var(--r-md);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 2px;
      cursor: pointer;
      color: #9CA3AF;
      transition: background 0.12s, color 0.12s;
    }
    .icon-rail__item:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .icon-rail__item.active { background: rgba(2,101,220,0.3); color: #60A5FA; }
    .icon-rail__item svg { width: 17px; height: 17px; fill: currentColor; }
    .icon-rail__item span { font-size: 8px; font-weight: 700; letter-spacing: 0.3px; line-height: 1; }

    /* Side nav */
    .side-nav {
      width: 208px;
      background: var(--bg-white);
      border-right: 1px solid var(--border-grey);
      display: flex; flex-direction: column;
      flex-shrink: 0;
      overflow-y: auto;
    }
    .side-nav__header {
      padding: 14px 16px 12px;
      font-size: 16px;
      font-weight: 800;
      color: var(--text-default);
      letter-spacing: -0.3px;
      border-bottom: 1px solid var(--border-grey);
      flex-shrink: 0;
    }
    .side-nav__group { padding: 8px 0; }
    .side-nav__label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-subdued);
      padding: 8px 16px 4px;
    }
    .side-nav__item {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px;
      font-size: 13px;
      color: var(--text-default);
      cursor: pointer;
      transition: background 0.1s;
      border-radius: 0;
      position: relative;
    }
    .side-nav__item:hover { background: var(--bg-grey-subdued); }
    .side-nav__item.active {
      background: var(--bg-primary-subdued);
      color: var(--text-primary);
      font-weight: 700;
    }
    .side-nav__item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 4px; bottom: 4px;
      width: 3px;
      background: var(--bg-primary);
      border-radius: 0 2px 2px 0;
    }
    .side-nav__badge {
      margin-left: auto;
      background: var(--danger-bg);
      color: var(--danger);
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: var(--r-full);
    }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-grey);
      padding: 0 24px;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .topbar__title {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-default);
      letter-spacing: -0.3px;
    }
    .topbar__breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--text-subdued);
    }
    .topbar__breadcrumb .crumb-link {
      color: var(--text-primary); font-weight: 600; cursor: pointer;
    }
    .topbar__breadcrumb .crumb-link:hover { text-decoration: underline; }
    .topbar__breadcrumb .crumb-sep { color: var(--border-grey-strong); }
    .topbar__breadcrumb .crumb-current { color: var(--text-default); font-weight: 600; }
    .topbar__actions { display: flex; gap: 8px; align-items: center; }

    .page-body { flex: 1; min-height: 0; overflow-y: auto; padding: 24px; }

    /* =====================================================
       BUTTONS
       ===================================================== */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid transparent;
      border-radius: var(--r-md);
      font-family: var(--font-body);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
      line-height: 1;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-md { padding: 9px 16px; font-size: 14px; }
    .btn-sm { padding: 5px 12px; font-size: 13px; }
    .btn-xs { padding: 3px 8px; font-size: 12px; }

    .btn-primary { background: var(--bg-primary); color: #fff; border-color: var(--bg-primary); }
    .btn-primary:hover:not(:disabled) { background: #0255C0; border-color: #0255C0; }

    .btn-secondary { background: var(--bg-white); color: var(--text-default); border-color: var(--border-grey-strong); }
    .btn-secondary:hover:not(:disabled) { background: var(--bg-grey-subdued); }

    .btn-ghost { background: transparent; color: var(--text-primary); border-color: transparent; }
    .btn-ghost:hover:not(:disabled) { background: var(--bg-primary-subdued); }

    .btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
    .btn-danger:hover:not(:disabled) { background: #C02B0E; }

    /* =====================================================
       BADGES
       ===================================================== */
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 2px 8px;
      border-radius: var(--r-full);
      font-size: 11px; font-weight: 700;
      white-space: nowrap;
    }
    .badge-success { background: var(--success-bg); color: var(--success); }
    .badge-danger  { background: var(--danger-bg);  color: var(--danger); }
    .badge-warning { background: var(--warning-bg); color: var(--warning-text); }
    .badge-info    { background: var(--bg-primary-subdued); color: var(--text-primary); }
    .badge-neutral { background: var(--bg-grey); color: var(--text-on-grey); }

    /* =====================================================
       CARD + TABLE
       ===================================================== */
    .card {
      background: var(--bg-white);
      border: 1px solid var(--border-grey);
      border-radius: var(--r-lg);
      overflow: hidden;
      box-shadow: var(--shadow-float);
    }

    .toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border-grey);
      background: var(--bg-white);
    }

    .search-box {
      display: flex; align-items: center; gap: 7px;
      background: var(--bg-grey-subdued);
      border: 1px solid var(--border-grey);
      border-radius: var(--r-md);
      padding: 6px 10px;
      flex: 1; max-width: 300px;
    }
    .search-box svg { color: var(--text-subdued); flex-shrink: 0; }
    .search-box input {
      border: none; background: transparent; outline: none;
      font-size: 13px; font-family: var(--font-body);
      color: var(--text-default); width: 100%;
    }
    .search-box input::placeholder { color: var(--text-subdued); }

    .filter-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 10px;
      border: 1px solid var(--border-grey);
      border-radius: var(--r-md);
      background: var(--bg-white);
      font-size: 12px; font-weight: 600; font-family: var(--font-body);
      color: var(--text-default);
      cursor: pointer;
      transition: all 0.1s;
    }
    .filter-chip:hover { background: var(--bg-grey-subdued); }
    .filter-chip.on { border-color: var(--border-primary); color: var(--text-primary); background: var(--bg-primary-subdued); }

    .count-label { font-size: 12px; color: var(--text-subdued); margin-left: auto; }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-subdued);
      padding: 9px 16px;
      border-bottom: 1px solid var(--border-grey);
      background: var(--bg-grey-subdued);
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border-grey);
      cursor: pointer;
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-grey-subdued); }
    td {
      padding: 11px 16px;
      font-size: 13px;
      color: var(--text-default);
      vertical-align: middle;
    }
    .td-link { color: var(--text-primary); font-weight: 600; }
    .td-sub  { font-size: 12px; color: var(--text-subdued); margin-top: 1px; }

    /* =====================================================
       STAT CARDS
       ===================================================== */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: var(--bg-white);
      border: 1px solid var(--border-grey);
      border-radius: var(--r-lg);
      padding: 16px 20px;
      box-shadow: var(--shadow-float);
    }
    .stat-card__label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--text-subdued);
      margin-bottom: 6px;
    }
    .stat-card__value {
      font-size: 26px; font-weight: 800;
      color: var(--text-default);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }
    .stat-card__sub { font-size: 12px; color: var(--text-subdued); margin-top: 3px; }

    /* =====================================================
       AVATAR
       ===================================================== */
    .avatar {
      border-radius: var(--r-md);
      background: var(--bg-primary-subdued);
      color: var(--text-primary);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      flex-shrink: 0;
    }
    .avatar-lg  { width: 48px; height: 48px; font-size: 16px; border-radius: var(--r-lg); }
    .avatar-md  { width: 34px; height: 34px; font-size: 12px; }
    .avatar-sm  { width: 26px; height: 26px; font-size: 10px; border-radius: var(--r-sm); }

    /* =====================================================
       TABS
       ===================================================== */
    .tabs { display: flex; border-bottom: 1px solid var(--border-grey); }
    .tab {
      padding: 11px 16px;
      font-size: 13px; font-weight: 600;
      color: var(--text-subdued);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.12s, border-color 0.12s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--text-default); }
    .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }

    /* =====================================================
       DRAWER
       ===================================================== */
    .backdrop {
      position: fixed; inset: 0;
      background: rgba(20,20,20,0.4);
      z-index: 100;
      display: flex; justify-content: flex-end;
    }
    .drawer {
      width: 580px; height: 100%;
      background: var(--bg-white);
      display: flex; flex-direction: column;
      box-shadow: var(--shadow-overlay);
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    .drawer__header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border-grey);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .drawer__title { font-size: 20px; font-weight: 800; color: var(--text-default); letter-spacing: -0.3px; }
    .drawer__close {
      width: 30px; height: 30px;
      border-radius: var(--r-md); border: none; background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      color: var(--text-subdued); transition: background 0.1s;
    }
    .drawer__close:hover { background: var(--bg-grey); color: var(--text-default); }
    .drawer__tabs { padding: 0 24px; border-bottom: 1px solid var(--border-grey); flex-shrink: 0; }
    .drawer__body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 22px; }
    .drawer__footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border-grey);
      display: flex; justify-content: flex-end; gap: 8px;
      flex-shrink: 0;
    }

    /* =====================================================
       FORM
       ===================================================== */
    .form-section { display: flex; flex-direction: column; gap: 14px; }
    .form-section__title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-subdued);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-grey);
    }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-grid-1 { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-label { font-size: 12px; font-weight: 600; color: var(--text-default); }
    .form-label .req { color: var(--danger); margin-left: 2px; }
    .form-hint { font-size: 11px; color: var(--text-subdued); }
    .form-input, .form-select, .form-textarea {
      border: 1px solid var(--border-grey-strong);
      border-radius: var(--r-md);
      padding: 7px 10px;
      font-size: 13px; font-family: var(--font-body);
      color: var(--text-default); background: var(--bg-white);
      outline: none; width: 100%;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--border-primary);
      box-shadow: 0 0 0 3px rgba(2,101,220,0.12);
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--text-subdued); }
    .form-textarea { resize: vertical; min-height: 76px; }

    /* Type toggle */
    .type-toggle { display: flex; gap: 8px; }
    .type-opt {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px;
      border: 1px solid var(--border-grey-strong);
      border-radius: var(--r-md);
      font-size: 13px; font-weight: 600; font-family: var(--font-body);
      cursor: pointer; background: var(--bg-white);
      transition: all 0.1s;
    }
    .type-opt.on { border-color: var(--border-primary); background: var(--bg-primary-subdued); color: var(--text-primary); }

    /* Trade pills */
    .pill-group { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 12px;
      border: 1px solid var(--border-grey-strong);
      border-radius: var(--r-full);
      font-size: 12px; font-weight: 600; font-family: var(--font-body);
      background: var(--bg-white);
      color: var(--text-default);
      cursor: pointer;
      transition: all 0.1s;
    }
    .pill:hover { border-color: var(--border-primary); color: var(--text-primary); }
    .pill.on { border-color: var(--border-primary); background: var(--bg-primary-subdued); color: var(--text-primary); }

    /* File drop zone */
    .dropzone {
      border: 1.5px dashed var(--border-grey-strong);
      border-radius: var(--r-md);
      padding: 20px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      text-align: center; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .dropzone:hover { border-color: var(--border-primary); background: var(--bg-primary-subdued); }
    .dropzone__icon { color: var(--text-subdued); margin-bottom: 2px; }
    .dropzone__cta { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .dropzone__hint { font-size: 11px; color: var(--text-subdued); }

    /* =====================================================
       DETAIL / PROFILE
       ===================================================== */
    .profile-header { display: flex; align-items: flex-start; gap: 16px; margin-bottom: 20px; }
    .profile-header__name { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; }
    .profile-header__meta { display: flex; gap: 12px; font-size: 13px; color: var(--text-subdued); margin-top: 4px; flex-wrap: wrap; }
    .profile-header__actions { display: flex; gap: 8px; margin-left: auto; flex-shrink: 0; }

    /* Info grid */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 20px; }
    .info-block__title {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
      color: var(--text-subdued);
      margin-bottom: 12px;
    }
    .info-row { display: flex; align-items: flex-start; gap: 8px; font-size: 13px; padding: 4px 0; }
    .info-row__label { color: var(--text-subdued); flex-shrink: 0; width: 80px; }
    .info-row__value { color: var(--text-default); }
    .info-row__value.link { color: var(--text-primary); cursor: pointer; }
    .info-row__value.link:hover { text-decoration: underline; }

    /* Compliance row */
    .compliance-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-grey);
      font-size: 13px;
    }
    .compliance-row:last-child { border-bottom: none; }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      padding: 52px 24px; gap: 8px; text-align: center;
    }
    .empty-state__icon { font-size: 36px; margin-bottom: 4px; }
    .empty-state__title { font-size: 15px; font-weight: 700; color: var(--text-default); }
    .empty-state__desc { font-size: 13px; color: var(--text-subdued); max-width: 300px; line-height: 1.6; }

    /* Progress bar */
    .progress-bar { height: 6px; background: var(--bg-grey); border-radius: 3px; overflow: hidden; }
    .progress-bar__fill { height: 100%; background: var(--bg-primary); border-radius: 3px; }

    /* divider */
    hr { border: none; border-top: 1px solid var(--border-grey); }

    /* Alert banner */
    .alert {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px;
      border-radius: var(--r-md);
      font-size: 13px;
      margin-bottom: 16px;
    }
    .alert-warning { background: var(--warning-bg); color: var(--warning-text); border: 1px solid #F0D080; }
    .alert-danger  { background: var(--danger-bg);  color: var(--danger);       border: 1px solid #F5B5A8; }

    /* =====================================================
       ASSIGNMENT DRAWER — picker rows, summary, doc list
       ===================================================== */
    .pick-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-grey);
      transition: background 0.1s;
    }
    .pick-row:last-child { border-bottom: none; }
    .pick-row:hover { background: var(--bg-grey-subdued); }
    .pick-row.selected { background: var(--bg-primary-subdued); }

    .selected-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px;
      border: 1px solid var(--border-primary);
      border-radius: var(--r-md);
      background: var(--bg-primary-subdued);
    }

    .assign-summary {
      display: flex; align-items: center; gap: 20px;
      background: var(--bg-grey-subdued);
      border: 1px solid var(--border-grey);
      border-radius: var(--r-md);
      padding: 14px 18px;
    }
    .assign-summary > div:not(:nth-child(2)) { flex: 1; }

    .doc-row {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;

      padding: 11px 16px; font-size: 13px; text-align: right;
      border-bottom: 1px solid var(--border-grey); vertical-align: middle;

    .bva-table td:first-child { text-align: left; font-weight: 600; }
    .bva-table tr.bva-subs  td { background: var(--bg-primary-subdued); }
    .bva-table tr.bva-total td {
      font-weight: 700; background: var(--bg-grey-subdued);
      border-top: 2px solid var(--border-grey-strong);
    }
    .bva-under { color: var(--success); font-weight: 700; }
    .bva-over  { color: var(--danger);  font-weight: 700; }

       ===================================================== */
    tfoot tr { background: var(--bg-grey-subdued); cursor: default !important; }
    tfoot tr:hover { background: var(--bg-grey-subdued) !important; }
    tfoot td { font-weight: 700; border-top: 2px solid var(--border-grey-strong); padding: 11px 16px; font-size: 13px; vertical-align: middle; }

    .contract-header-strip {
      background: var(--bg-white);
      border-bottom: 1px solid var(--border-grey);
      padding: 14px 24px;
      flex-shrink: 0;
    }
    .contract-stats-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    .contract-stat {
      background: var(--bg-grey-subdued);
      border: 1px solid var(--border-grey);
      border-radius: var(--r-md);
      padding: 10px 14px;
    }
    .contract-stat__label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-subdued); margin-bottom: 4px;

    .contract-stat__value { font-size: 18px; font-weight: 800; }

    /* =====================================================

    .gantt-row {

      grid-template-columns: 260px 1fr;

    .gantt-timeline { position: relative; height: 28px; }

    .compliance-doc-row:last-child { border-bottom: none; }

      border: 1px solid #F0D080;
      border-radius: var(--r-md);

    .portal-section-label {

    }

/* ================================================================
   STATUS BADGE (shared)
   ================================================================ */
const StatusBadge = ({ s }) => {
  if (s === "active")    return <span className="badge badge-success">Active</span>;
  if (s === "completed") return <span className="badge badge-neutral">Completed</span>;
  if (s === "invited")   return <span className="badge badge-info">Invited</span>;
  if (s === "on hold")   return <span className="badge badge-warning">On Hold</span>;
  if (s === "removed")   return <span className="badge badge-danger">Removed</span>;
  return <span className="badge badge-neutral">{s}</span>;
};

/* ================================================================

   ================================================================ */
const AssignDrawer = ({ subs, jobs, assignments, onClose, onSave, preSelectedSub = null, preSelectedJob = null }) => {

  const [subQ, setSubQ]         = useState("");

  const set = (k, v) => setF(p => ({ ...p, [k]: v }));

  const activeSubs = subs.filter(s => s.status === "active");
  const filteredSubs = !subQ
    ? activeSubs
    : activeSubs.filter(s =>
        s.name.toLowerCase().includes(subQ.toLowerCase()) ||
        s.trades.some(t => t.toLowerCase().includes(subQ.toLowerCase()))

  const step1Valid = selSub && selJob;

  const save = () => {
    onSave({
      id: Date.now(),

      jobId: selJob.id,

                          <div key={s.id} className={`pick-row ${selSub?.id===s.id?"selected":""}`} onClick={()=>setSelSub(s)}>

/* ================================================================
   DIRECTORY VIEW
   ================================================================ */
const DirectoryView = ({ subs, onAdd, onSelect }) => {
  const [q, setQ]            = useState("");
  const [tradeFil, setTrade] = useState(null);
  const [statusFil, setStatus] = useState(null);

  const filtered = subs.filter(s => {
    const lo = q.toLowerCase();
    const mQ = !lo || s.name.toLowerCase().includes(lo) || s.contact.toLowerCase().includes(lo) || s.trades.some(t=>t.toLowerCase().includes(lo));
    const mT = !tradeFil  || s.trades.includes(tradeFil);
    const mS = !statusFil || s.status === statusFil;
    return mQ && mT && mS;
  });

  const needsAttention = subs.filter(s=>s.coi==="expired"||s.coi==="expiring").length;

  return (
    <div>
      <div className="topbar">
        <span className="topbar__title">Subcontractor Directory</span>
        <div className="topbar__actions">
          <button className="btn btn-md btn-primary" onClick={onAdd}><Ic n="add" s={16}/> Add Subcontractor</button>
        </div>
      </div>
      <div className="page-body">
        <div className="stats-row">
          <div className="stat-card">
            <div className="stat-card__label">Total Subcontractors</div>
            <div className="stat-card__value">{subs.length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">Active Assignments</div>
            <div className="stat-card__value">{subs.reduce((a,s)=>a+s.activeJobs,0)}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">COI Attention Needed</div>
            <div className="stat-card__value" style={{color: needsAttention > 0 ? "var(--danger)" : "inherit"}}>
              {needsAttention}
            </div>
            {needsAttention > 0 && <div className="stat-card__sub" style={{color:"var(--danger)"}}>Review compliance</div>}
          </div>
        </div>

        <div className="card">
          <div className="toolbar">
            <div className="search-box">
              <Ic n="search" s={15}/>
              <input placeholder="Search by name, trade, or contact…" value={q} onChange={e=>setQ(e.target.value)} />
            </div>
            {["Electrical","Plumbing","Roofing"].map(t => (
              <button key={t} className={`filter-chip ${tradeFil===t?"on":""}`}
                onClick={()=>setTrade(tradeFil===t?null:t)}>{t}</button>
            ))}
            <button className={`filter-chip ${statusFil==="active"?"on":""}`}
              onClick={()=>setStatus(statusFil==="active"?null:"active")}>
              <Ic n="filter" s={11}/> Active only
            </button>
            <span className="count-label">{filtered.length} of {subs.length}</span>
          </div>

          {filtered.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state__icon">🔍</div>
              <div className="empty-state__title">No results</div>
              <div className="empty-state__desc">Try adjusting your search or clearing filters.</div>
            </div>
          ) : (
            <table>
              <thead>
                <tr>
                  <th>Subcontractor</th>
                  <th>Trade(s)</th>
                  <th>Region</th>
                  <th>COI</th>
                  <th>W-9</th>
                  <th>Active Jobs</th>
                  <th>Total Spend</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(sub => (
                  <tr key={sub.id} onClick={()=>onSelect(sub)}>
                    <td>
                      <div style={{display:"flex",alignItems:"center",gap:10}}>
                        <div className="avatar avatar-md">{initials(sub.name)}</div>
                        <div>
                          <div className="td-link">{sub.name}</div>
                          <div className="td-sub">{sub.contact}</div>
                        </div>
                      </div>
                    </td>
                    <td>
                      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                        {sub.trades.map(t=><span key={t} className="badge badge-neutral" style={{fontSize:11}}>{t}</span>)}
                      </div>
                    </td>
                    <td style={{color:"var(--text-subdued)"}}>{sub.region}</td>
                    <td><CoiBadge s={sub.coi}/></td>
                    <td><span className={`badge ${sub.w9?"badge-success":"badge-danger"}`}>{sub.w9?"On File":"Missing"}</span></td>
                    <td style={{fontWeight:600, textAlign:"center"}}>{sub.activeJobs}</td>
                    <td style={{fontWeight:600}}>{fmtDollar(sub.totalSpend)}</td>
                    <td onClick={e=>e.stopPropagation()}>
                      <button className="btn btn-sm btn-secondary" onClick={()=>onSelect(sub)}>View</button>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   SPEND REPORTS VIEW  (with per-job drill-down)
   ================================================================ */
const SpendView = ({ subs, assignments, jobs, onViewSub, expandedId, setExpandedId }) => {

  const total  = subs.reduce((a,s) => a + s.totalSpend, 0);
  const sorted = [...subs].sort((a,b) => b.totalSpend - a.totalSpend);

  const subRows = subId =>
    assignments
      .filter(a => a.subId === subId)
      .map(a => ({
        ...a,
        job:        jobs.find(j => j.id === a.jobId),
        poPaid:     a.pos.filter(p => p.status === "paid").reduce((t,p) => t + p.amt, 0),
        poPending:  a.pos.filter(p => p.status !== "paid").reduce((t,p) => t + p.amt, 0),
      }))
      .filter(a => a.job);

  return (
    <div>
      <div className="topbar">
        <span className="topbar__title">Sub Spend Reports</span>
        <div className="topbar__actions">
          <button className="btn btn-md btn-secondary">Export CSV</button>
        </div>
      </div>
      <div className="page-body">
        <div className="stats-row">
          <div className="stat-card">
            <div className="stat-card__label">Total Sub Spend YTD</div>
            <div className="stat-card__value">{fmtDollar(total)}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">Subs with Spend</div>
            <div className="stat-card__value">{subs.filter(s=>s.totalSpend>0).length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">Avg Spend / Sub</div>
            <div className="stat-card__value">{fmtDollar(Math.round(total / subs.filter(s=>s.totalSpend>0).length))}</div>
          </div>
        </div>

        <div className="card">
          <table>
            <thead>
              <tr>
                <th style={{width:32}}></th>
                <th>Subcontractor</th>
                <th>Primary Trade</th>
                <th>Total Spend</th>
                <th>Active Jobs</th>
                <th style={{width:200}}>% of Sub Spend</th>
              </tr>
            </thead>
            <tbody>
              {sorted.map(s => {
                const open = expandedId === s.id;
                const rows = subRows(s.id);
                return (
                  <React.Fragment key={s.id}>

                    {/* ── Summary row ── */}
                    <tr onClick={() => setExpandedId(open ? null : s.id)}
                      style={{cursor:"pointer", background: open ? "var(--bg-primary-subdued)" : undefined}}>
                      <td style={{padding:"11px 4px 11px 14px", color:"var(--text-subdued)"}}>
                        <div style={{display:"flex", transition:"transform 0.15s",
                          transform: open ? "rotate(90deg)" : "none"}}>
                          <Ic n="chev" s={14}/>
                        </div>
                      </td>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div className="avatar avatar-sm">{initials(s.name)}</div>
                          <span className="td-link">{s.name}</span>
                        </div>
                      </td>
                      <td style={{color:"var(--text-subdued)"}}>{s.trades[0]}</td>
                      <td style={{fontWeight:700}}>{fmtDollar(s.totalSpend)}</td>
                      <td style={{textAlign:"center"}}>{s.activeJobs}</td>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div className="progress-bar" style={{flex:1}}>
                            <div className="progress-bar__fill"
                              style={{width:`${Math.round((s.totalSpend/total)*100)}%`}}/>
                          </div>
                          <span style={{fontSize:12,color:"var(--text-subdued)",width:32,textAlign:"right"}}>
                            {Math.round((s.totalSpend/total)*100)}%
                          </span>
                        </div>
                      </td>
                    </tr>

                    {/* ── Drill-down row ── */}
                    {open && (
                      <tr style={{cursor:"default"}}>
                        <td colSpan={6} style={{padding:0, borderBottom:"2px solid var(--border-primary)"}}>
                          <div style={{background:"var(--bg-grey-subdued)", padding:"14px 20px 16px 52px"}}>
                            {rows.length === 0 ? (
                              <p style={{fontSize:13, color:"var(--text-subdued)", padding:"4px 0"}}>
                                No PO-linked assignments recorded for this sub yet.
                              </p>
                            ) : (<>
                              <table style={{marginBottom:12}}>
                                <thead>
                                  <tr>
                                    <th style={{background:"var(--bg-grey)", fontSize:10}}>Job / Project</th>
                                    <th style={{background:"var(--bg-grey)", fontSize:10}}>Cost Code</th>
                                    <th style={{background:"var(--bg-grey)", fontSize:10}}>Status</th>
                                    <th style={{background:"var(--bg-grey)", fontSize:10}}>Contracted</th>
                                    <th style={{background:"var(--bg-grey)", fontSize:10}}>PO Paid</th>
                                    <th style={{background:"var(--bg-grey)", fontSize:10}}>PO Pending</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {rows.map(a => (
                                    <tr key={a.id} style={{cursor:"default", background:"var(--bg-grey-subdued)"}}>
                                      <td style={{background:"var(--bg-grey-subdued)"}}>
                                        <div style={{fontWeight:600, fontSize:13}}>{a.job.name}</div>
                                        <div style={{fontSize:11, color:"var(--text-subdued)"}}>{a.job.customer}</div>
                                      </td>
                                      <td style={{background:"var(--bg-grey-subdued)", color:"var(--text-subdued)", fontSize:12}}>
                                        {a.costCode || "—"}
                                      </td>
                                      <td style={{background:"var(--bg-grey-subdued)"}}>
                                        <StatusBadge s={a.status}/>
                                      </td>
                                      <td style={{background:"var(--bg-grey-subdued)", fontWeight:600}}>
                                        {a.contractedAmt > 0 ? fmtDollar(a.contractedAmt) : "—"}
                                      </td>
                                      <td style={{background:"var(--bg-grey-subdued)", fontWeight:600, color:"var(--success)"}}>
                                        {a.poPaid > 0
                                          ? fmtDollar(a.poPaid)
                                          : <span style={{color:"var(--text-muted)"}}>—</span>}
                                      </td>
                                      <td style={{background:"var(--bg-grey-subdued)"}}>
                                        {a.poPending > 0
                                          ? <span style={{fontWeight:600, color:"var(--warning-text)"}}>{fmtDollar(a.poPending)}</span>
                                          : <span style={{color:"var(--text-muted)"}}>—</span>}
                                      </td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                              <button className="btn btn-sm btn-ghost"
                                onClick={e => { e.stopPropagation(); onViewSub(s); }}>
                                View Sub Profile →
                              </button>
                            </>)}
                          </div>
                        </td>
                      </tr>
                    )}

                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   ASSIGNMENTS VIEW
   ================================================================ */
const AssignmentsView = ({ assignments, subs, jobs, onNew, onNotify }) => {
  const [statusFil, setStatusFil] = useState(null);

  const getSubById = id => subs.find(s => s.id === id);
  const getJobById = id => jobs.find(j => j.id === id);

  const filtered = statusFil
    ? assignments.filter(a => a.status === statusFil)
    : assignments;

  const totalContracted = assignments.reduce((a,x) => a + x.contractedAmt, 0);
  const totalPaid = assignments.reduce((a,x) =>
    a + x.pos.filter(p=>p.status==="paid").reduce((b,p) => b + p.amt, 0), 0);
  const activeCount = assignments.filter(a => a.status==="active").length;
  const pendingPOs = assignments.reduce((a,x) =>
    a + x.pos.filter(p=>p.status==="pending").reduce((b,p) => b + p.amt, 0), 0);

  return (
    <div>
      <div className="topbar">
        <span className="topbar__title">Sub Assignments</span>
        <div className="topbar__actions">
          <button className="btn btn-md btn-primary" onClick={onNew}><Ic n="link" s={15}/> Assign Sub to Job</button>
        </div>
      </div>
      <div className="page-body">
        <div className="stats-row-4">
          <div className="stat-card">
            <div className="stat-card__label">Total Assignments</div>
            <div className="stat-card__value">{assignments.length}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">Active</div>
            <div className="stat-card__value">{activeCount}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">Total Contracted</div>
            <div className="stat-card__value" style={{fontSize:20}}>{fmtDollar(totalContracted)}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">POs Pending Approval</div>
            <div className="stat-card__value" style={{fontSize:20,color: pendingPOs > 0 ? "var(--warning-text)" : "inherit"}}>{fmtDollar(pendingPOs)}</div>
            {pendingPOs > 0 && <div className="stat-card__sub" style={{color:"var(--warning-text)"}}>Awaiting approval</div>}
          </div>
        </div>

        <div className="card">
          <div className="toolbar">
            {[null,"active","invited","on hold","completed"].map(s => (
              <button key={s || "all"}
                className={`filter-chip ${statusFil===s?"on":""}`}
                onClick={()=>setStatusFil(s)}>
                {s ? s.charAt(0).toUpperCase()+s.slice(1) : "All"}
              </button>
            ))}
            <span className="count-label">{filtered.length} of {assignments.length}</span>
          </div>

          {filtered.length === 0 ? (
            <div className="empty-state">
              <div className="empty-state__icon">📋</div>
              <div className="empty-state__title">No assignments</div>
              <div className="empty-state__desc">Assign a subcontractor from the Directory, or click the button above.</div>
            </div>
          ) : (
            <table>
              <thead>
                <tr>
                  <th>Subcontractor</th>
                  <th>Job / Project</th>
                  <th>Scope</th>
                  <th>Status</th>
                  <th>Contracted</th>
                  <th>PO Paid</th>
                  <th>PO Pending</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(a => {
                  const sub = getSubById(a.subId);
                  const job = getJobById(a.jobId);
                  const poPaid    = a.pos.filter(p=>p.status==="paid").reduce((t,p)=>t+p.amt,0);
                  const poPending = a.pos.filter(p=>p.status!=="paid").reduce((t,p)=>t+p.amt,0);
                  if (!sub || !job) return null;
                  return (
                    <tr key={a.id} style={{cursor:"default"}}>
                      <td>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div className="avatar avatar-sm">{initials(sub.name)}</div>
                          <div>
                            <div className="td-link">{sub.name}</div>
                            <div className="td-sub">{sub.trades[0]}</div>
                          </div>
                        </div>
                      </td>
                      <td>
                        <div style={{fontWeight:600,fontSize:13}}>{job.name}</div>
                        <div className="td-sub">{job.customer}</div>
                      </td>
                      <td style={{maxWidth:240}}>
                        <div style={{fontSize:13,color:"var(--text-subdued)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:230}}>{a.scope}</div>
                        {a.costCode && <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{a.costCode}</div>}
                      </td>
                      <td><StatusBadge s={a.status}/></td>
                      <td style={{fontWeight:600}}>
                        {a.contractedAmt > 0 ? fmtDollar(a.contractedAmt) : <span style={{color:"var(--text-muted)"}}>—</span>}
                      </td>
                      <td style={{fontWeight:600,color:"var(--success)"}}>
                        {poPaid > 0 ? fmtDollar(poPaid) : <span style={{color:"var(--text-muted)"}}>—</span>}
                      </td>
                      <td>
                        {poPending > 0
                          ? <span style={{fontSize:13,fontWeight:600,color:"var(--warning-text)"}}>{fmtDollar(poPending)}</span>
                          : <span style={{color:"var(--text-muted)"}}>—</span>}
                      </td>
                      <td>
                        {a.status === "invited" ? (
                          <div style={{display:"flex",flexDirection:"column",gap:3}}>
                            <button className="btn btn-xs btn-secondary" onClick={()=>onNotify(a)}>
                              <Ic n="mail" s={11}/> Resend
                            </button>
                            {a.notifiedAt && <div style={{fontSize:10,color:"var(--text-subdued)"}}>Sent {a.notifiedAt}</div>}
                          </div>
                        ) : a.status === "active" && !a.notifiedAt ? (
                          <button className="btn btn-xs btn-primary" onClick={()=>onNotify(a)}>
                            <Ic n="mail" s={11}/> Notify Sub
                          </button>
                        ) : (
                          <span style={{color:"var(--text-muted)",fontSize:12}}>—</span>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
};

/* ================================================================

   ================================================================ */
const NotifySubDrawer = ({ assignment, subs, jobs, onClose, onSend }) => {
  const sub = subs.find(s => s.id === assignment.subId);
  const job = jobs.find(j => j.id === assignment.jobId);
  const isResend = !!assignment.notifiedAt;

  const defaultBody =
`Hi ${sub?.contact?.split(" ")[0] || "there"},

We'd like to invite ${sub?.name || "your company"} to perform the following work:

Project: ${job?.name || assignment.jobId}
Scope: ${assignment.scope}${assignment.contractedAmt > 0 ? `\nContracted Amount: ${fmtDollar(assignment.contractedAmt)}` : ""}${assignment.costCode ? `\nCost Code: ${assignment.costCode}` : ""}

Please review the details and accept or decline this assignment through the link below. Once accepted, you'll have access to the full job details and documents through your Subcontractor Portal.

Reply to this email or contact us directly with any questions.

Thank you,
Your Project Manager`;

  const [to,      setTo]      = useState(sub?.email || "");
  const [subject, setSubject] = useState(`Assignment ${isResend ? "Reminder" : "Invitation"}: ${job?.name || assignment.jobId}`);
  const [body,    setBody]    = useState(defaultBody);
  const [sent,    setSent]    = useState(false);

  if (sent) return (
    <div className="backdrop" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="drawer" style={{alignItems:"center",justifyContent:"center",gap:16}}>
        <div style={{fontSize:48}}>✅</div>
        <div style={{fontSize:18,fontWeight:800,color:"var(--text-default)"}}>Assignment Sent</div>
        <div style={{fontSize:13,color:"var(--text-subdued)",textAlign:"center",maxWidth:320,lineHeight:1.6}}>
          {sub?.contact} at <strong>{sub?.name}</strong> has been notified.<br/>
          Their assignment status is now <strong>Invited</strong> — you'll see it update here when they respond.
        </div>
        <button className="btn btn-md btn-primary" style={{marginTop:8}} onClick={onClose}>Done</button>
      </div>
    </div>
  );

  return (
    <div className="backdrop" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="drawer">
        <div className="drawer__header">
          <span className="drawer__title">{isResend ? "Resend Assignment" : "Notify Subcontractor"}</span>
          <button className="drawer__close" onClick={onClose}><Ic n="close" s={18}/></button>
        </div>

        <div className="drawer__body">
          {/* Assignment context strip */}
          <div className="assign-summary">
            <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
              <div className="avatar avatar-sm">{initials(sub?.name||"?")}</div>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{sub?.name}</div>
                <div style={{fontSize:12,color:"var(--text-subdued)"}}>{sub?.trades?.[0]}</div>
              </div>
            </div>
            <div style={{color:"var(--text-subdued)",fontSize:18}}>→</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{job?.name||assignment.jobId}</div>
              <div style={{fontSize:12,color:"var(--text-subdued)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:200}}>{assignment.scope}</div>
            </div>
          </div>

          {isResend && (
            <div className="alert alert-warning">
              <Ic n="warn" s={15}/>
              <span>Originally sent <strong>{assignment.notifiedAt}</strong>. Sub has not yet responded.</span>
            </div>
          )}

          <div className="form-section">
            <div className="form-section__title">Email</div>
            <div className="form-field">
              <label className="form-label">To</label>
              <input className="form-input" value={to} onChange={e=>setTo(e.target.value)} placeholder="recipient@company.com"/>
            </div>
            <div className="form-field">
              <label className="form-label">Subject</label>
              <input className="form-input" value={subject} onChange={e=>setSubject(e.target.value)}/>
            </div>
            <div className="form-field">
              <label className="form-label">Message</label>
              <textarea className="form-textarea" rows={14} value={body} onChange={e=>setBody(e.target.value)}/>
            </div>
          </div>

          <div style={{background:"var(--bg-grey-subdued)",border:"1px solid var(--border-grey)",borderRadius:"var(--r-md)",padding:"10px 14px",fontSize:12,color:"var(--text-subdued)"}}>
            <Ic n="portal" s={13}/> A <strong>portal link</strong> will be appended automatically so the sub can accept or decline directly from the email.
          </div>

        <div className="drawer__footer">
          <button className="btn btn-md btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-md btn-primary" disabled={!to.trim()} onClick={()=>{ setSent(true); onSend(assignment.id); }}>
            <Ic n="mail" s={15}/> {isResend ? "Resend Notification" : "Send Assignment"}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   CREATE PO DRAWER
   ================================================================ */
const CreatePoDrawer = ({ assignment, subs, onClose, onSave }) => {
  const sub = subs.find(s => s.id === assignment.subId);
  const alreadyIssued = assignment.pos.reduce((t,p) => t + p.amt, 0);
  const remaining = assignment.contractedAmt - alreadyIssued;

  const [poNum,   setPoNum]   = useState(nextPoId());
  const [amt,     setAmt]     = useState("");
  const [desc,    setDesc]    = useState("");
  const [date,    setDate]    = useState(new Date().toISOString().slice(0,10));
  const [status,  setStatus]  = useState("pending");

  const amtNum   = parseFloat(amt) || 0;
  const overBudget = amtNum > remaining && amtNum > 0;
  const canSave  = amt.trim() !== "" && amtNum > 0;

  const save = () => {
    const dateStr = date ? new Date(date).toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}) : "Mar 26, 2026";
    onSave(assignment.id, { id: poNum, amt: amtNum, status, description: desc || "—", date: dateStr });
  };

  return (
    <div className="backdrop" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="drawer">
        <div className="drawer__header">
          <span className="drawer__title">Issue Purchase Order</span>
          <button className="drawer__close" onClick={onClose}><Ic n="close" s={18}/></button>
        </div>

        <div className="drawer__body">
          {/* Context strip */}
          <div className="assign-summary" style={{marginBottom:20}}>
            <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
              <div className="avatar">{sub ? initials(sub.name) : "?"}</div>
              <div>
                <div style={{fontWeight:700,fontSize:13}}>{sub?.name || "—"}</div>
                <div style={{fontSize:12,color:"var(--text-subdued)"}}>{sub?.trades[0]} · {assignment.costCode}</div>
              </div>
            </div>
            <div style={{color:"var(--text-subdued)",fontSize:18,fontWeight:300}}>→</div>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,fontSize:13}}>{assignment.jobId}</div>
              <div style={{fontSize:12,color:"var(--text-subdued)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:180}} title={assignment.scope}>{assignment.scope}</div>
            </div>
          </div>

          {/* W-9 warning */}
          {sub && !sub.w9 && (
            <div style={{background:"var(--warning-bg)",border:"1px solid var(--warning-border,#fbbf24)",borderRadius:"var(--r-md)",padding:"10px 14px",marginBottom:16,display:"flex",gap:8,alignItems:"flex-start",fontSize:13}}>
              <Ic n="warn" s={16}/>
              <span>No W-9 on file for <strong>{sub.name}</strong>. Payment may not be 1099-reportable.</span>
            </div>
          )}

          {/* PO Details */}
          <div className="form-section">
            <div className="form-section__title">Purchase Order Details</div>
            <div className="form-grid-2">
              <div className="form-field">
                <label className="form-label">PO Number <span className="req">*</span></label>
                <input className="form-input" value={poNum} onChange={e=>setPoNum(e.target.value)} />
              </div>
              <div className="form-field">
                <label className="form-label">Issue Date</label>
                <input className="form-input" type="date" value={date} onChange={e=>setDate(e.target.value)} />
              </div>
            </div>
            <div className="form-field" style={{marginTop:12}}>
              <label className="form-label">Amount <span className="req">*</span></label>
              <input className="form-input" type="number" min="0" placeholder="0.00"
                value={amt} onChange={e=>setAmt(e.target.value)} />
              <div style={{marginTop:6,fontSize:12,color:"var(--text-subdued)"}}>
                Contracted: <strong>{fmtDollar(assignment.contractedAmt)}</strong>
                &nbsp;·&nbsp; Already issued: <strong>{fmtDollar(alreadyIssued)}</strong>
                &nbsp;·&nbsp; Remaining: <strong style={{color:remaining>0?"var(--success)":"var(--danger)"}}>{fmtDollar(remaining)}</strong>
              </div>
              {overBudget && (
                <div style={{marginTop:6,background:"var(--warning-bg)",border:"1px solid var(--warning-border,#fbbf24)",borderRadius:4,padding:"6px 10px",fontSize:12,display:"flex",gap:6,alignItems:"center"}}>
                  <Ic n="warn" s={13}/> This PO exceeds the remaining contract balance by {fmtDollar(amtNum - remaining)}.
                </div>
              )}
            </div>
            <div className="form-field" style={{marginTop:12}}>
              <label className="form-label">Description / Invoice Reference</label>
              <textarea className="form-textarea" rows={2}
                placeholder="e.g. Progress billing – Phase 2 complete"
                value={desc} onChange={e=>setDesc(e.target.value)} />
            </div>
          </div>

          {/* Initial status */}
          <div className="form-section">
            <div className="form-section__title">Initial Status</div>
            <div className="type-toggle">
              {["pending","approved"].map(s => (
                <button key={s} className={`type-opt ${status===s?"on":""}`} onClick={()=>setStatus(s)}>
                  {s === "pending" ? "Pending (needs approval)" : "Approved (skip to approval)"}
                </button>
              ))}
            </div>
          </div>
        </div>

        <div className="drawer__footer">
          <button className="btn btn-md btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn btn-md btn-primary" disabled={!canSave} onClick={save}>
            Save Purchase Order
          </button>
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   PROJECT FINANCIALS TAB (Full BvA)
   ================================================================ */
const ProjectFinancials = ({ project, assignments }) => {
  const bTotal = Object.values(project.budget).reduce((a,v)=>a+v,0);
  const aTotal = Object.values(project.actual).reduce((a,v)=>a+v,0);
  const projAssign = assignments.filter(a => a.jobId === project.id);
  const subPaid    = projAssign.reduce((t,a)=>t+a.pos.filter(p=>p.status==="paid").reduce((s,p)=>s+p.amt,0),0);
  const subPending = projAssign.reduce((t,a)=>t+a.pos.filter(p=>p.status!=="paid").reduce((s,p)=>s+p.amt,0),0);

  return (
    <div className="page-body">
      <div className="card" style={{padding:0}}>
        <div style={{padding:"12px 20px", borderBottom:"1px solid var(--border-grey)", fontWeight:700, fontSize:13}}>
          Budget vs. Actual
        </div>
        <table className="bva-table">
          <thead><tr><th>Cost Category</th><th>Budget</th><th>Committed</th><th>Actual</th><th>Remaining</th><th>% Used</th></tr></thead>
          <tbody>
            {[
              {l:"Labor",          b:project.budget.labor,    a:project.actual.labor,    committed:null},
              {l:"Materials",      b:project.budget.materials, a:project.actual.materials, committed:null},
              {l:"Subcontractors", b:project.budget.subs,      a:project.actual.subs,     committed:subPaid+subPending, hl:true},
              {l:"Overhead",       b:project.budget.overhead,  a:project.actual.overhead,  committed:null},
            ].map(r => {
              const committed = r.committed ?? r.a;
              const rem = r.b - r.a;
              const pct = Math.round((r.a/r.b)*100);
              const over = rem < 0;
              return (
                <tr key={r.l} className={r.hl?"bva-subs":""}>
                  <td>
                    <div>{r.l}</div>
                    {r.hl && <div style={{fontSize:11, color:"var(--text-primary)", marginTop:3}}>
                      {projAssign.length} sub{projAssign.length!==1?"s":""} assigned · {fmtDollar(subPaid)} paid · {fmtDollar(subPending)} pending
                    </div>}
                  </td>
                  <td>{fmtDollar(r.b)}</td>
                  <td style={{color:"var(--text-subdued)"}}>{fmtDollar(committed)}</td>
                  <td>{fmtDollar(r.a)}</td>
                  <td className={over?"bva-over":""}>{fmtDollar(rem)}</td>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:8,justifyContent:"flex-end"}}>
                      <div className="progress-bar" style={{width:60}}>
                        <div className="progress-bar__fill" style={{width:`${Math.min(pct,100)}%`, background:over?"var(--danger)":undefined}}/>
                      </div>
                      <span className={over?"bva-over":pct>90?"bva-over":"bva-under"}>{pct}%</span>
                    </div>
                  </td>
                </tr>
              );
            })}
            <tr className="bva-total">
              <td>Total Project Cost</td>
              <td>{fmtDollar(bTotal)}</td><td>—</td><td>{fmtDollar(aTotal)}</td>
              <td className={bTotal-aTotal>=0?"bva-under":"bva-over"}>{fmtDollar(bTotal-aTotal)}</td>
              <td className={Math.round(aTotal/bTotal*100)>90?"bva-over":"bva-under"}>{Math.round(aTotal/bTotal*100)}%</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
};

      poPending: a.pos.filter(p=>p.status!=="paid").reduce((t,p)=>t+p.amt,0),
    }))
    .filter(a => a.sub);

  const totContracted = projAssign.reduce((t,a)=>t+a.contractedAmt,0);
  const totPaid       = projAssign.reduce((t,a)=>t+a.poPaid,0);
  const totPending    = projAssign.reduce((t,a)=>t+a.poPending,0);

  return (

          <div key={s.l} className="stat-card">
            <div className="stat-card__label">{s.l}</div>
            <div className="stat-card__value" style={s.style}>{s.v}</div>

        ))}
      </div>

      {projAssign.length === 0 ? (
        <div className="card" style={{padding:48,textAlign:"center"}}>
          <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>No Subcontractors Assigned</div>

        </div>
      ) : (
        <div className="card" style={{padding:0}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",borderBottom:"1px solid var(--border-grey)"}}>

            <button className="btn btn-sm btn-primary" onClick={onAssign}><Ic n="add" s={14}/> Assign Sub</button>

          <table style={{tableLayout:"fixed",width:"100%"}}>

              <tr>

                <th style={{width:"18%"}}>Scope / Cost Code</th>
                <th style={{width:"11%"}}>Status</th>
                <th style={{width:"20%"}}>PO Spend</th>
                <th style={{width:"29%"}}>Actions</th>
              </tr>
            </thead>
            <tbody>
              {projAssign.map(a => (
                <tr key={a.id} style={{cursor:"default"}}>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <div className="avatar avatar-sm">{initials(a.sub.name)}</div>
                      <div style={{minWidth:0}}>
                        <div className="td-link" style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{a.sub.name}</div>
                        <div className="td-sub">{a.sub.trades[0]}</div>
                      </div>
                    </div>
                  </td>
                  <td>
                    <div style={{fontSize:12,color:"var(--text-subdued)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={a.scope}>{a.scope}</div>
                    {a.costCode && <div style={{fontSize:11,color:"var(--text-muted)",marginTop:2}}>{a.costCode}</div>}
                  </td>
                  <td><StatusBadge s={a.status}/></td>
                  <td>
                    <div style={{fontSize:12}}>
                      <span style={{color:"var(--text-subdued)"}}>Contracted: </span>
                      <span style={{fontWeight:700}}>{a.contractedAmt>0?fmtDollar(a.contractedAmt):"—"}</span>
                    </div>
                    <div style={{fontSize:12,marginTop:2,display:"flex",gap:8}}>
                      <span style={{color:"var(--success)",fontWeight:600}}>{a.poPaid>0?`Paid ${fmtDollar(a.poPaid)}`:"No POs paid"}</span>
                      {a.poPending>0 && <span style={{color:"var(--warning-text)",fontWeight:600}}>· {fmtDollar(a.poPending)} pending</span>}
                    </div>
                  </td>
                  <td>
                    <div style={{display:"flex",gap:6,alignItems:"center"}}>
                      {a.status === "invited" ? (
                        <div style={{display:"flex",flexDirection:"column",gap:3}}>
                          <button className="btn btn-xs btn-secondary" onClick={e=>{ e.stopPropagation(); onNotify && onNotify(a); }}>
                            <Ic n="mail" s={11}/> Resend
                          </button>
                          {a.notifiedAt && <div style={{fontSize:10,color:"var(--text-subdued)"}}>Sent {a.notifiedAt}</div>}
                        </div>
                      ) : a.status === "active" && !a.notifiedAt ? (
                        <button className="btn btn-xs btn-primary" onClick={e=>{ e.stopPropagation(); onNotify && onNotify(a); }}>
                          <Ic n="mail" s={11}/> Notify Sub
                        </button>
                      ) : a.notifiedAt ? (
                        <span style={{fontSize:10,color:"var(--text-subdued)"}}>Notified {a.notifiedAt}</span>
                      ) : null}
                      <button className="btn btn-sm btn-secondary"
                        onClick={e=>{ e.stopPropagation(); onIssuePo && onIssuePo(a); }}>
                        + Issue PO
                      </button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

const PoBadge = ({ s }) => {
  if (s === "paid")     return <span className="badge badge-success">Paid</span>;
  if (s === "approved") return <span className="badge badge-info">Approved</span>;
  return <span className="badge badge-warning">Pending</span>;
};

const ProjectPurchasingTab = ({ project, subs, assignments, onIssuePo, onUpdatePoStatus }) => {
  const [filter, setFilter] = useState("all");

  // Flatten all POs for this project with enriched context
  const allPos = assignments
    .filter(a => a.jobId === project.id)
    .flatMap(a => {
      const sub = subs.find(s => s.id === a.subId);
      return a.pos.map(p => ({ ...p, assignment: a, sub }));
    })
    .filter(p => p.sub);

  const filtered = filter === "all" ? allPos : allPos.filter(p => p.status === filter);

  const totPOs      = allPos.length;
  const totPaid     = allPos.filter(p=>p.status==="paid").reduce((t,p)=>t+p.amt,0);
  const totApproved = allPos.filter(p=>p.status==="approved").reduce((t,p)=>t+p.amt,0);
  const totPending  = allPos.filter(p=>p.status==="pending").reduce((t,p)=>t+p.amt,0);

  return (
    <div className="page-body">
      {/* Stat cards */}
      <div className="stats-row-4">
        {[
          {l:"Total POs",    v:totPOs,                                      style:{}},
          {l:"Pending",      v:fmtDollar(totPending),  style:{color:totPending>0?"var(--warning-text)":undefined}},
          {l:"Approved",     v:fmtDollar(totApproved), style:{color:"var(--text-primary)"}},
          {l:"Paid",         v:fmtDollar(totPaid),     style:{color:"var(--success)"}},
        ].map(s => (
          <div key={s.l} className="stat-card">
            <div className="stat-card__label">{s.l}</div>
            <div className="stat-card__value" style={s.style}>{s.v}</div>
          </div>
        ))}
      </div>

      <div className="card" style={{padding:0}}>
        {/* Toolbar */}
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 20px",borderBottom:"1px solid var(--border-grey)",flexWrap:"wrap"}}>
          <div style={{flex:1,display:"flex",gap:6,flexWrap:"wrap"}}>
            {["all","pending","approved","paid"].map(f => (
              <button key={f} className={`filter-chip ${filter===f?"on":""}`}
                onClick={()=>setFilter(f)}>
                {f.charAt(0).toUpperCase()+f.slice(1)}
                {f!=="all" && <span style={{marginLeft:4,fontWeight:700}}>
                  ({allPos.filter(p=>p.status===f).length})
                </span>}
              </button>
            ))}
          </div>
          <span style={{fontSize:12,color:"var(--text-subdued)"}}>{filtered.length} PO{filtered.length!==1?"s":""}</span>
        </div>

        {filtered.length === 0 ? (
          <div style={{padding:40,textAlign:"center",color:"var(--text-subdued)",fontSize:13}}>
            No purchase orders {filter !== "all" ? `with status "${filter}"` : "on this project"} yet.
          </div>
        ) : (
          <table>
            <thead>
              <tr>
                <th>PO #</th><th>Subcontractor</th><th>Description</th>
                <th>Cost Code</th><th>Date</th><th>Amount</th><th>Status</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((p,i) => (
                <tr key={p.id+i}>
                  <td><span style={{fontWeight:700,fontFamily:"monospace"}}>{p.id}</span></td>
                  <td>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      <div className="avatar avatar-sm">{initials(p.sub.name)}</div>
                      <div>
                        <div style={{fontWeight:600,fontSize:13}}>{p.sub.name}</div>
                        <div className="td-sub">{p.sub.trades[0]}</div>
                      </div>
                    </div>
                  </td>
                  <td style={{fontSize:12,color:"var(--text-subdued)",maxWidth:180}}>
                    <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={p.description}>{p.description}</div>
                  </td>
                  <td style={{fontSize:12,color:"var(--text-subdued)"}}>{p.assignment.costCode||"—"}</td>
                  <td style={{fontSize:12,color:"var(--text-subdued)",whiteSpace:"nowrap"}}>{p.date||"—"}</td>
                  <td style={{fontWeight:700,whiteSpace:"nowrap"}}>{fmtDollar(p.amt)}</td>
                  <td><PoBadge s={p.status}/></td>
                  <td>
                    {p.status === "pending" && (
                      <button className="btn btn-sm btn-primary"
                        onClick={()=>onUpdatePoStatus(p.assignment.id,p.id,"approved")}>
                        Approve
                      </button>
                    )}
                    {p.status === "approved" && (
                      <button className="btn btn-sm btn-primary" style={{background:"var(--success)"}}
                        onClick={()=>onUpdatePoStatus(p.assignment.id,p.id,"paid")}>
                        Mark Paid
                      </button>
                    )}
                    {p.status === "paid" && <span style={{fontSize:12,color:"var(--text-subdued)"}}>—</span>}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
};

/* ================================================================

   ================================================================ */
const ScheduleView = ({schedule, subs, jobs, onNew}) => {
  const [filterStatus, setFilterStatus] = useState("all");
  // Timeline: Aug 2025 – Nov 2026
  const rangeStart = new Date("2025-08-01");
  const rangeEnd   = new Date("2026-11-30");
  const today      = new Date("2026-05-01");
  const todayPct   = ((today-rangeStart)/(rangeEnd-rangeStart))*100;
  const posPct     = d => Math.max(0,Math.min(100,((new Date(d)-rangeStart)/(rangeEnd-rangeStart))*100));
  const MONTHS     = ["Aug '25","Sep","Oct","Nov","Dec","Jan '26","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov '26"];

  const filtered   = filterStatus==="all" ? schedule : schedule.filter(e=>e.status===filterStatus);
  const activeNow  = schedule.filter(e=>e.status==="active").length;
  const completing = schedule.filter(e=>{
    const d=(new Date(e.endDate)-today)/(1000*60*60*24);
    return d>=0&&d<=45&&e.status==="active";
  }).length;

  return (
    <div>
      <div className="topbar">
        <span className="topbar__title">Sub Schedule</span>
        <div className="topbar__actions">
          <button className="btn btn-md btn-primary" onClick={onNew}><Ic n="add" s={16}/> Schedule Sub</button>
        </div>
      </div>
      <div className="page-body">
        <div className="stats-row">
          <div className="stat-card">
            <div className="stat-card__label">Scheduled Subs</div>
            <div className="stat-card__value">{new Set(schedule.map(e=>e.subId)).size}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">Active Right Now</div>
            <div className="stat-card__value">{activeNow}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">Completing in 45 Days</div>
            <div className="stat-card__value" style={{color:completing>0?"var(--warning-text)":undefined}}>{completing}</div>
          </div>
        </div>
        <div className="card" style={{padding:0}}>
          {/* Filter toolbar */}
          <div className="toolbar">
            {[{v:"all",l:"All"},{v:"active",l:"Active"},{v:"completed",l:"Completed"}].map(f=>(
              <button key={f.v} className={`filter-chip ${filterStatus===f.v?"on":""}`} onClick={()=>setFilterStatus(f.v)}>
                {f.l} <span style={{marginLeft:3,fontWeight:700}}>({(f.v==="all"?schedule:schedule.filter(e=>e.status===f.v)).length})</span>
              </button>
            ))}
          </div>

          {/* Month header */}
          <div style={{display:"grid",gridTemplateColumns:"270px 1fr",gap:0,padding:"8px 20px 4px",background:"var(--bg-grey-subdued)",borderBottom:"1px solid var(--border-grey)"}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"var(--text-subdued)"}}>Sub / Assignment</div>
            <div style={{position:"relative",height:16}}>
              {MONTHS.map((m,i)=>(
                <div key={i} style={{position:"absolute",left:`${(i/MONTHS.length)*100}%`,transform:"translateX(-50%)",fontSize:9,fontWeight:700,color:"var(--text-subdued)",textTransform:"uppercase",letterSpacing:"0.3px",whiteSpace:"nowrap"}}>{m}</div>
              ))}
              <div style={{position:"absolute",left:`${todayPct}%`,transform:"translateX(-50%)",fontSize:9,fontWeight:800,color:"var(--text-primary)",whiteSpace:"nowrap",top:0}}>TODAY</div>
            </div>
          </div>

          {/* Gantt rows */}
          {filtered.map(entry=>{
            const sub=subs.find(s=>s.id===entry.subId);
            const job=jobs.find(j=>j.id===entry.jobId);
            const s=posPct(entry.startDate);
            const e=posPct(entry.endDate);
            const w=Math.max(0.5,e-s);
            const isPast=entry.status==="completed";
            return (
              <div key={entry.id} className="gantt-row" style={{background:isPast?"var(--bg-grey-subdued)":"var(--bg-white)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                  <div className="avatar avatar-sm">{initials(sub?.name||"?")}</div>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub?.name||"—"}</div>
                    <div style={{fontSize:11,color:"var(--text-subdued)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.phase} · {job?.name||entry.jobId}</div>
                  </div>
                </div>
                <div className="gantt-timeline">
                  {MONTHS.map((_,i)=>(
                    <div key={i} style={{position:"absolute",left:`${(i/MONTHS.length)*100}%`,top:0,bottom:0,borderLeft:"1px solid var(--border-grey)"}}/>
                  ))}
                  <div style={{position:"absolute",left:`${todayPct}%`,top:-2,bottom:-2,width:2,background:"var(--text-primary)",zIndex:2}}/>
                  <div style={{
                    position:"absolute",left:`${s}%`,width:`${w}%`,
                    top:"50%",transform:"translateY(-50%)",
                    height:16,borderRadius:4,zIndex:1,
                    background:isPast?"#D1D5DB":"var(--bg-primary)",
                    display:"flex",alignItems:"center",overflow:"hidden",
                  }}>
                    <span style={{fontSize:9,fontWeight:700,color:isPast?"#6B7280":"white",whiteSpace:"nowrap",padding:"0 5px",overflow:"hidden",textOverflow:"ellipsis"}}>
                      {entry.crewSize} crew · {entry.phase}
                    </span>
                  </div>
                </div>
              </div>
            );
          })}

          <div style={{padding:"8px 20px",background:"var(--bg-grey-subdued)",borderTop:"1px solid var(--border-grey)",display:"flex",gap:20,alignItems:"center",fontSize:11,color:"var(--text-subdued)"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:12,height:10,borderRadius:2,background:"var(--bg-primary)"}}/>Active</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:12,height:10,borderRadius:2,background:"#D1D5DB"}}/>Completed</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:2,height:12,background:"var(--text-primary)"}}/>Today — May 1, 2026</div>
          </div>
        </div>
      </div>
    </div>
  );
};
