   FEATURE 9 — SCHEDULE / DISPATCH VIEW
   ================================================================ */
const ScheduleView = ({schedule, subs, jobs, onNew}) => {
  const [filterStatus, setFilterStatus] = useState("all");
  // Timeline: Aug 2025 – Nov 2026
  const rangeStart = new Date("2025-08-01");
  const rangeEnd   = new Date("2026-11-30");
  const today      = new Date("2026-05-01");
  const todayPct   = ((today-rangeStart)/(rangeEnd-rangeStart))*100;
  const posPct     = d => Math.max(0,Math.min(100,((new Date(d)-rangeStart)/(rangeEnd-rangeStart))*100));
  const MONTHS     = ["Aug '25","Sep","Oct","Nov","Dec","Jan '26","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov '26"];

  const filtered   = filterStatus==="all" ? schedule : schedule.filter(e=>e.status===filterStatus);
  const activeNow  = schedule.filter(e=>e.status==="active").length;
  const completing = schedule.filter(e=>{
    const d=(new Date(e.endDate)-today)/(1000*60*60*24);
    return d>=0&&d<=45&&e.status==="active";
  }).length;

  return (
    <div>
      <div className="topbar">
        <span className="topbar__title">Sub Schedule</span>
        <div className="topbar__actions">
          <button className="btn btn-md btn-primary" onClick={onNew}><Ic n="add" s={16}/> Schedule Sub</button>
        </div>
      </div>
      <div className="page-body">
        <div className="stats-row">
          <div className="stat-card">
            <div className="stat-card__label">Scheduled Subs</div>
            <div className="stat-card__value">{new Set(schedule.map(e=>e.subId)).size}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">Active Right Now</div>
            <div className="stat-card__value">{activeNow}</div>
          </div>
          <div className="stat-card">
            <div className="stat-card__label">Completing in 45 Days</div>
            <div className="stat-card__value" style={{color:completing>0?"var(--warning-text)":undefined}}>{completing}</div>
          </div>
        </div>
        <div className="card" style={{padding:0}}>
          {/* Filter toolbar */}
          <div className="toolbar">
            {[{v:"all",l:"All"},{v:"active",l:"Active"},{v:"completed",l:"Completed"}].map(f=>(
              <button key={f.v} className={`filter-chip ${filterStatus===f.v?"on":""}`} onClick={()=>setFilterStatus(f.v)}>
                {f.l} <span style={{marginLeft:3,fontWeight:700}}>({(f.v==="all"?schedule:schedule.filter(e=>e.status===f.v)).length})</span>
              </button>
            ))}
          </div>

          {/* Month header */}
          <div style={{display:"grid",gridTemplateColumns:"270px 1fr",gap:0,padding:"8px 20px 4px",background:"var(--bg-grey-subdued)",borderBottom:"1px solid var(--border-grey)"}}>
            <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"var(--text-subdued)"}}>Sub / Assignment</div>
            <div style={{position:"relative",height:16}}>
              {MONTHS.map((m,i)=>(
                <div key={i} style={{position:"absolute",left:`${(i/MONTHS.length)*100}%`,transform:"translateX(-50%)",fontSize:9,fontWeight:700,color:"var(--text-subdued)",textTransform:"uppercase",letterSpacing:"0.3px",whiteSpace:"nowrap"}}>{m}</div>
              ))}
              <div style={{position:"absolute",left:`${todayPct}%`,transform:"translateX(-50%)",fontSize:9,fontWeight:800,color:"var(--text-primary)",whiteSpace:"nowrap",top:0}}>TODAY</div>
            </div>
          </div>

          {/* Gantt rows */}
          {filtered.map(entry=>{
            const sub=subs.find(s=>s.id===entry.subId);
            const job=jobs.find(j=>j.id===entry.jobId);
            const s=posPct(entry.startDate);
            const e=posPct(entry.endDate);
            const w=Math.max(0.5,e-s);
            const isPast=entry.status==="completed";
            return (
              <div key={entry.id} className="gantt-row" style={{background:isPast?"var(--bg-grey-subdued)":"var(--bg-white)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,minWidth:0}}>
                  <div className="avatar avatar-sm">{initials(sub?.name||"?")}</div>
                  <div style={{minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sub?.name||"—"}</div>
                    <div style={{fontSize:11,color:"var(--text-subdued)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{entry.phase} · {job?.name||entry.jobId}</div>
                  </div>
                </div>
                <div className="gantt-timeline">
                  {MONTHS.map((_,i)=>(
                    <div key={i} style={{position:"absolute",left:`${(i/MONTHS.length)*100}%`,top:0,bottom:0,borderLeft:"1px solid var(--border-grey)"}}/>
                  ))}
                  <div style={{position:"absolute",left:`${todayPct}%`,top:-2,bottom:-2,width:2,background:"var(--text-primary)",zIndex:2}}/>
                  <div style={{
                    position:"absolute",left:`${s}%`,width:`${w}%`,
                    top:"50%",transform:"translateY(-50%)",
                    height:16,borderRadius:4,zIndex:1,
                    background:isPast?"#D1D5DB":"var(--bg-primary)",
                    display:"flex",alignItems:"center",overflow:"hidden",
                  }}>
                    <span style={{fontSize:9,fontWeight:700,color:isPast?"#6B7280":"white",whiteSpace:"nowrap",padding:"0 5px",overflow:"hidden",textOverflow:"ellipsis"}}>
                      {entry.crewSize} crew · {entry.phase}
                    </span>
                  </div>
                </div>
              </div>
            );
          })}

          <div style={{padding:"8px 20px",background:"var(--bg-grey-subdued)",borderTop:"1px solid var(--border-grey)",display:"flex",gap:20,alignItems:"center",fontSize:11,color:"var(--text-subdued)"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:12,height:10,borderRadius:2,background:"var(--bg-primary)"}}/>Active</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:12,height:10,borderRadius:2,background:"#D1D5DB"}}/>Completed</div>
            <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:2,height:12,background:"var(--text-primary)"}}/>Today — May 1, 2026</div>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   FEATURE 8 — SUB PORTAL PREVIEW
   ================================================================ */
const SubPortalView = ({subs, assignments, jobs}) => {
  const activeSubs = subs.filter(s=>s.status==="active");
  const [selSubId, setSelSubId] = useState(activeSubs[0]?.id||null);
  const sub = subs.find(s=>s.id===selSubId);
  const myAssign = assignments.filter(a=>a.subId===selSubId&&a.status==="active");
  const totalPaid = assignments.filter(a=>a.subId===selSubId)
    .reduce((t,a)=>t+a.pos.filter(p=>p.status==="paid").reduce((s,p)=>s+p.amt,0),0);

  return (
    <div>
      <div className="topbar">
        <span className="topbar__title">Sub Portal Preview</span>
        <div className="topbar__actions">
          <select className="form-input" style={{width:260,fontSize:13}}
            value={selSubId||""}
            onChange={e=>setSelSubId(parseInt(e.target.value))}>
            {activeSubs.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
          <button className="btn btn-md btn-secondary"><Ic n="portal" s={14}/> Send Portal Link</button>
        </div>
      </div>
      <div className="page-body" style={{background:"#F3F4F6"}}>
        <div className="portal-banner">
          <Ic n="warn" s={15}/>
          <span><strong>Portal Preview Mode</strong> — Read-only view of what {sub?.name||"this sub"} sees when they log into their portal. No actions are sent to the subcontractor.</span>
        </div>

        <div className="portal-frame">
          {/* Portal nav */}
          <div className="portal-nav">
            <svg viewBox="0 0 32 32" width="26" height="26">
              <circle cx="16" cy="16" r="15" fill="#0265DC"/>
              <text x="16" y="21" textAnchor="middle" fill="white" fontSize="12" fontWeight="800" fontFamily="'Nunito Sans',sans-serif">ST</text>
            </svg>
            <div style={{flex:1}}>
              <div style={{color:"white",fontWeight:800,fontSize:14}}>Subcontractor Portal</div>
              <div style={{color:"#9CA3AF",fontSize:11}}>Powered by ServiceTitan</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div className="avatar avatar-sm" style={{background:"rgba(255,255,255,0.15)",color:"white"}}>{sub?initials(sub.name):"?"}</div>
              <div>
                <div style={{color:"white",fontWeight:600,fontSize:13}}>{sub?.contact||"—"}</div>
                <div style={{color:"#9CA3AF",fontSize:11}}>{sub?.name}</div>
              </div>
            </div>
          </div>

          {/* Welcome strip */}
          <div style={{background:"var(--bg-primary-subdued)",borderBottom:"1px solid var(--border-grey)",padding:"14px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontSize:16,fontWeight:800}}>Welcome back, {sub?.contact?.split(" ")[0]||"there"}</div>
              <div style={{fontSize:12,color:"var(--text-subdued)",marginTop:2}}>{myAssign.length} active job{myAssign.length!==1?"s":""} · {fmtDollar(totalPaid)} paid to date</div>
            </div>
            <span className="badge badge-success" style={{fontSize:12}}>Active Vendor</span>
          </div>

          {/* Active jobs */}
          <div style={{padding:"20px 28px"}}>
            <div className="portal-section-label">Active Jobs</div>
            {myAssign.length===0 ? (
              <div style={{textAlign:"center",padding:"32px",color:"var(--text-subdued)",fontSize:13}}>No active job assignments at this time.</div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {myAssign.map(a=>{
                  const job=jobs.find(j=>j.id===a.jobId);
                  const paid=a.pos.filter(p=>p.status==="paid").reduce((t,p)=>t+p.amt,0);
                  const pending=a.pos.filter(p=>p.status!=="paid").reduce((t,p)=>t+p.amt,0);
                  return (
                    <div key={a.id} className="portal-job-card">
                      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                        <div>
                          <div style={{fontWeight:700,fontSize:14}}>{job?.name||a.jobId}</div>
                          <div style={{fontSize:12,color:"var(--text-subdued)",marginTop:2}}>{job?.address}</div>
                        </div>
                        <StatusBadge s={a.status}/>
                      </div>
                      <div style={{fontSize:13,lineHeight:1.6,marginBottom:12,padding:"8px 12px",background:"white",borderRadius:"var(--r-sm)",border:"1px solid var(--border-grey)"}}>
                        <span style={{fontSize:11,fontWeight:700,color:"var(--text-subdued)",textTransform:"uppercase",display:"block",marginBottom:3}}>Your Scope</span>
                        {a.scope}
                      </div>
                      <div style={{display:"flex",gap:24}}>
                        {[
                          {l:"Contracted",   v:fmtDollar(a.contractedAmt),         color:undefined},
                          {l:"Paid to Date", v:fmtDollar(paid),                    color:"var(--success)"},
                          {l:"Pending",      v:pending>0?fmtDollar(pending):"—",   color:pending>0?"var(--warning-text)":undefined},
                        ].map(s=>(
                          <div key={s.l}>
                            <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",color:"var(--text-subdued)"}}>{s.l}</div>
                            <div style={{fontWeight:700,fontSize:14,color:s.color||"var(--text-default)"}}>{s.v}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* Documents on file */}
          <div style={{padding:"0 28px 20px",borderTop:"1px solid var(--border-grey)",marginTop:4}}>
            <div style={{padding:"16px 0 12px"}} className="portal-section-label">Documents On File</div>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[
                {label:"Certificate of Insurance", badge:<CoiBadge s={sub?.coi||"n/a"}/>},
                {label:"W-9 / Tax Form",           badge:<span className={`badge ${sub?.w9?"badge-success":"badge-danger"}`}>{sub?.w9?"On File":"Missing"}</span>},
                {label:"Contractor License",       badge:<span className={`badge ${sub?.lic?"badge-success":"badge-neutral"}`}>{sub?.lic||"Not Provided"}</span>},
              ].map(d=>(
                <div key={d.label} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",border:"1px solid var(--border-grey)",borderRadius:"var(--r-sm)",background:"white"}}>
                  <div style={{fontWeight:600,fontSize:13}}>{d.label}</div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    {d.badge}
                    <button className="btn btn-xs btn-secondary"><Ic n="upload" s={11}/> Upload</button>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Footer */}
          <div style={{background:"var(--bg-grey-subdued)",borderTop:"1px solid var(--border-grey)",padding:"12px 28px",fontSize:12,color:"var(--text-subdued)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span>Questions? Contact your project manager at {sub?.email||"—"}</span>
            <span style={{display:"flex",alignItems:"center",gap:4}}>
              <svg viewBox="0 0 32 32" width="14" height="14"><circle cx="16" cy="16" r="15" fill="#0265DC"/><text x="16" y="21" textAnchor="middle" fill="white" fontSize="12" fontWeight="800" fontFamily="'Nunito Sans',sans-serif">ST</text></svg>
              Powered by ServiceTitan
            </span>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   ROOT APP
   ================================================================ */
const RAIL_ITEMS = [
  {id:"dashboard",  label:"Dashboard"},
  {id:"calls",      label:"Calls"},
  {id:"sched",      label:"Schedule"},
  {id:"dispatch",   label:"Dispatch"},
  {id:"accounting", label:"Accounting"},
  {id:"inventory",  label:"Inventory"},
  {id:"followup",   label:"Follow Up"},
  {id:"reports",    label:"Reports"},
  {id:"marketing",  label:"Marketing"},
  {id:"pricebook",  label:"Pricebook"},
  {id:"projects",   label:"Projects"},
  {id:"subs",       label:"Subs"},
];

function App() {
  const [subs, setSubs]               = useState(SUBS_INIT);
  const [jobs]                        = useState(JOBS_INIT);
  const [assignments, setAssignments] = useState(ASSIGNMENTS_INIT);
  const [activeRail, setRail]         = useState("subs");
  const [activeSection, setSection]   = useState("directory");
  const [selectedSub, setSelected]    = useState(null);
  const [showAdd, setShowAdd]         = useState(false);
  const [showAssign, setShowAssign]   = useState(false);
  const [assignTarget, setAssignTarget] = useState(null);
  const [spendExpanded, setSpendExpanded] = useState(null);
  // Projects module state
  const [selectedProject, setSelectedProject] = useState(null);
  const [projectTab,      setProjectTab]       = useState("dashboard");
  // PO flow state
  const [showCreatePo,   setShowCreatePo]   = useState(false);
  const [createPoTarget, setCreatePoTarget] = useState(null);
  // P1 state
  const [subcontracts, setSubcontracts] = useState(SUBCONTRACTS_INIT);
  const [lienWaivers,  setLienWaivers]  = useState(LIEN_WAIVERS_INIT);
  const [complianceDocs]                = useState(COMPLIANCE_DOCS_INIT);
  const [schedule]                      = useState(SCHEDULE_INIT);
  const [selectedContract, setSelectedContract] = useState(null);

  const openAssign = useCallback((sub = null) => {
    setAssignTarget(sub);
    setShowAssign(true);
  }, []);

  const handleSaveSub = useCallback(sub => {
    setSubs(p => [sub, ...p]);
    setShowAdd(false);
  }, []);

  const handleSaveAssignment = useCallback(newA => {
    setAssignments(p => [newA, ...p]);
    // bump activeJobs on the sub
    setSubs(p => p.map(s => s.id === newA.subId ? { ...s, activeJobs: s.activeJobs + 1 } : s));
    setShowAssign(false);
    setAssignTarget(null);
    // navigate to assignments view so user can see the result
    setSection("assignments");
    setSelected(null);
  }, []);

  const handleSavePo = useCallback((assignmentId, poData) => {
    setAssignments(prev => prev.map(a =>
      a.id === assignmentId ? { ...a, pos: [...a.pos, poData] } : a
    ));
    setShowCreatePo(false);
    setCreatePoTarget(null);
  }, []);

  const handleUpdatePoStatus = useCallback((assignmentId, poId, newStatus) => {
    setAssignments(prev => prev.map(a =>
      a.id !== assignmentId ? a : {
        ...a, pos: a.pos.map(p => p.id === poId ? { ...p, status: newStatus } : p)
      }
    ));
  }, []);

  const goToSub = useCallback(sub => {
    setSection("directory");
    setSelected(sub);
  }, []);

  const renderMain = () => {
    /* ── Not-in-scope rails ── */
    if (activeRail !== "subs" && activeRail !== "projects") {
      const label = RAIL_ITEMS.find(r => r.id === activeRail)?.label || activeRail;
      return (
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:40}}>
          <div style={{width:64,height:64,borderRadius:"var(--r-lg)",background:"var(--bg-grey)",display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text-subdued)"}}>
            <Ic n={activeRail} s={30}/>
          </div>
          <div style={{fontSize:20,fontWeight:800,color:"var(--text-default)",letterSpacing:"-0.3px"}}>{label}</div>
          <div style={{fontSize:14,color:"var(--text-subdued)",maxWidth:340,textAlign:"center",lineHeight:1.6}}>
            This section is not part of the subcontractor management prototype.<br/>
            Navigate to <strong>Projects</strong> or <strong>Subs</strong> to explore the prototype flows.
          </div>
        </div>
      );
    }

    /* ── Projects module ── */
    if (activeRail === "projects") {
      if (!selectedProject) return <ProjectsList onSelect={p=>{ setSelectedProject(p); setProjectTab("dashboard"); }} />;
      const tabContent = () => {
        const openIssuePo = a => { setCreatePoTarget(a); setShowCreatePo(true); };
        if (projectTab === "dashboard")  return <ProjectDashboard project={selectedProject} />;
        if (projectTab === "financials") return <ProjectFinancials project={selectedProject} assignments={assignments} />;
        if (projectTab === "subs")       return <ProjectSubsTab project={selectedProject} subs={subs} assignments={assignments} onAssign={()=>openAssign(null)} onIssuePo={openIssuePo} />;
        if (projectTab === "purchasing") return <ProjectPurchasingTab project={selectedProject} subs={subs} assignments={assignments} onIssuePo={openIssuePo} onUpdatePoStatus={handleUpdatePoStatus} />;
        return <ProjectStub name={PROJECT_NAV.find(n=>n.id===projectTab)?.label||projectTab} />;
      };
      return (
        <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
          <ProjectHeader project={selectedProject} />
          <div style={{flex:1,overflowY:"auto"}}>
            {tabContent()}
          </div>
        </div>
      );
    }

    /* ── Subs module ── */
    if (activeSection === "directory") {
      if (selectedSub) {
        // keep selectedSub in sync with subs state (activeJobs may have changed)
        const liveSub = subs.find(s => s.id === selectedSub.id) ?? selectedSub;
        return (
          <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
            <div className="topbar">
              <div className="topbar__breadcrumb">
                <span className="crumb-link" onClick={()=>setSelected(null)}>Directory</span>
                <span className="crumb-sep"><Ic n="chev" s={13}/></span>
                <span className="crumb-current">{liveSub.name}</span>
              </div>
              <div className="topbar__actions">
                <button className="btn btn-md btn-primary" onClick={()=>setShowAdd(true)}>
                  <Ic n="add" s={16}/> Add Subcontractor
                </button>
              </div>
            </div>
            <div className="page-body">
              <SubDetail
                sub={liveSub}
                onBack={()=>setSelected(null)}
                onAssign={()=>openAssign(liveSub)}
                assignments={assignments}
                jobs={jobs}
              />
            </div>
          </div>
        );
      }
      return <DirectoryView subs={subs} onAdd={()=>setShowAdd(true)} onSelect={setSelected} />;
    }
    if (activeSection === "assignments") {
      return <AssignmentsView assignments={assignments} subs={subs} jobs={jobs} onNew={()=>openAssign(null)} />;
    }
    if (activeSection === "spend") return <SpendView subs={subs} assignments={assignments} jobs={jobs} onViewSub={goToSub} expandedId={spendExpanded} setExpandedId={setSpendExpanded} />;

    // ── P1 sections ──
    if (activeSection === "subcontracts") {
      if (selectedContract) {
        return <SubcontractDetail
          contract={selectedContract}
          subs={subs} jobs={jobs} lienWaivers={lienWaivers}
          onBack={()=>setSelectedContract(null)}
        />;
      }
      return <SubcontractsView
        subcontracts={subcontracts} subs={subs} jobs={jobs}
        onSelect={c=>setSelectedContract(c)}
        onNew={()=>{}}
      />;
    }
    if (activeSection === "lien-waivers") {
      return <LienWaiversView
        lienWaivers={lienWaivers} subs={subs} jobs={jobs}
        onMarkReceived={id=>setLienWaivers(prev=>prev.map(w=>w.id===id?{...w,status:"received"}:w))}
      />;
    }
    if (activeSection === "compliance-docs") {
      return <ComplianceDocsView subs={subs} complianceDocs={complianceDocs} />;
    }
    if (activeSection === "schedule") {
      return <ScheduleView schedule={schedule} subs={subs} jobs={jobs} onNew={()=>openAssign(null)} />;
    }
    if (activeSection === "portal") {
      return <SubPortalView subs={subs} assignments={assignments} jobs={jobs} />;
    }
    return null;
  };

  return (
    <div className="shell">
      {/* Icon rail */}
      <nav className="icon-rail">
        <div className="icon-rail__logo">
          <svg viewBox="0 0 32 32" width="30" height="30">
            <circle cx="16" cy="16" r="15" fill="#0265DC"/>
            <text x="16" y="21" textAnchor="middle" fill="white" fontSize="12" fontWeight="800"
              fontFamily="'Nunito Sans', sans-serif">ST</text>
          </svg>
        </div>
        {RAIL_ITEMS.map(item => (
          <div key={item.id} className={`icon-rail__item ${activeRail===item.id?"active":""}`}
            onClick={()=>setRail(item.id)}>
            <Ic n={item.id} s={17}/>
            <span>{item.label}</span>
          </div>
        ))}
      </nav>

      {/* Side nav */}
      <nav className="side-nav" style={{display:"flex",flexDirection:"column"}}>

        {/* ── Subs module nav ── */}
        {activeRail === "subs" && <>
          <div className="side-nav__header">Subcontractors</div>

          <div className="side-nav__group">
            <div className="side-nav__label">Manage</div>
            {[
              {id:"directory",    label:"Directory"},
              {id:"assignments",  label:"Assignments"},
              {id:"subcontracts", label:"Subcontracts"},
              {id:"schedule",     label:"Schedule"},
            ].map(item => (
              <div key={item.id}
                className={`side-nav__item ${activeSection===item.id?"active":""}`}
                onClick={()=>{ setSection(item.id); setSelected(null); setSelectedContract(null); }}>
                {item.label}
                {item.id==="directory" && subs.filter(s=>s.coi==="expired").length > 0 &&
                  <span className="side-nav__badge">{subs.filter(s=>s.coi==="expired").length}</span>}
                {item.id==="assignments" && assignments.filter(a=>a.pos.some(p=>p.status==="pending")).length > 0 &&
                  <span className="side-nav__badge" style={{background:"var(--warning-bg)",color:"var(--warning-text)"}}>
                    {assignments.filter(a=>a.pos.some(p=>p.status==="pending")).length}
                  </span>}
              </div>
            ))}
          </div>

          <div className="side-nav__group">
            <div className="side-nav__label">Compliance</div>
            {[
              {id:"compliance-docs", label:"Compliance Docs",
               badge: complianceDocs.filter(d=>d.status==="expired"||d.status==="missing").length},
              {id:"lien-waivers",    label:"Lien Waivers",
               badge: lienWaivers.filter(w=>w.status==="overdue").length},
            ].map(item => (
              <div key={item.id}
                className={`side-nav__item ${activeSection===item.id?"active":""}`}
                onClick={()=>{ setSection(item.id); setSelected(null); }}>
                {item.label}
                {item.badge > 0 &&
                  <span className="side-nav__badge">{item.badge}</span>}
              </div>
            ))}
          </div>

          <div className="side-nav__group">
            <div className="side-nav__label">Reporting</div>
            <div className={`side-nav__item ${activeSection==="spend"?"active":""}`}
              onClick={()=>{ setSection("spend"); setSelected(null); }}>
              Spend Reports
            </div>
          </div>

          <div className="side-nav__group">
            <div className="side-nav__label">Portal</div>
            <div className={`side-nav__item ${activeSection==="portal"?"active":""}`}
              onClick={()=>{ setSection("portal"); setSelected(null); }}>
              Sub Portal Preview
            </div>
          </div>
        </>}

        {/* ── Projects module nav (list) ── */}
        {activeRail === "projects" && !selectedProject && <>
          <div className="side-nav__header">Projects</div>
          <div className="side-nav__group">
            <div className="side-nav__item active">All Projects</div>
          </div>
        </>}

        {/* ── Projects module nav (project detail) ── */}
        {activeRail === "projects" && selectedProject && <>
          <div className="side-nav__back"
            onClick={()=>{ setSelectedProject(null); setProjectTab("dashboard"); }}>
            <Ic n="back" s={14}/> Projects
          </div>
          <div style={{overflowY:"auto", flex:1, paddingTop:4}}>
            {PROJECT_NAV.map(item => (
              <div key={item.id}
                className={`side-nav__item proj-nav-item ${projectTab===item.id?"active":""} ${item.hl?"hl":""}`}
                onClick={()=>setProjectTab(item.id)}>
                <div className="pnl">{item.label}</div>
                <div className="pns">{item.sub}</div>
              </div>
            ))}
          </div>
        </>}

      </nav>

      {/* Main content */}
      <div className="main">
        {renderMain()}
      </div>

      {showAdd && <AddDrawer onClose={()=>setShowAdd(false)} onSave={handleSaveSub} />}
      {showAssign && (
        <AssignDrawer
          subs={subs}
          jobs={jobs}
          assignments={assignments}
          preSelectedSub={assignTarget}
          onClose={()=>{ setShowAssign(false); setAssignTarget(null); }}
          onSave={handleSaveAssignment}
        />
      )}
      {showCreatePo && createPoTarget && (
        <CreatePoDrawer
          assignment={createPoTarget}
          subs={subs}
          onClose={()=>{ setShowCreatePo(false); setCreatePoTarget(null); }}
          onSave={handleSavePo}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
